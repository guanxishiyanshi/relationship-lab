<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感出厂设置</title>
    <style>
        /* 全局样式 */
        body {
            margin: 0;
            padding: 16px;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
            color: #ffffff;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .title {
            font-size: 36px;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
        }

        .start-btn {
            background: linear-gradient(135deg, #f0974a, #e05a2a);
            border: none;
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            padding: 16px 64px;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(224, 90, 42, 0.3);
        }
        .container {
    animation: fadeIn 0.8s ease;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}</style>
</head>
<body>
    <div class="container">
        <div class="title">你的情感<br>出厂设置是什么？</div>
        <div class="subtitle">一份为不善言辞的你，准备的情感体检</div>
        <button class="start-btn" onclick="window.location.href='test.html'">男生入口</button>
        <div style="margin-top: 1px; font-size: 16px; color: rgba(255,255,255,0.4);">或</div>
<button class="start-btn" style="background:linear-gradient(135deg,#e05a8a,#c04a6a); box-shadow:0 8px 20px rgba(224,90,138,0.3);" onclick="window.location.href='partner-test.html'">女生入口</button>
    </div>
</body>
</html>
