<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感出厂设置 · 测试中</title>
    <style>
        body { margin:0; padding:16px; background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 100%); min-height:100vh; font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif; color:#fff; box-sizing:border-box; }
        .progress-bar { width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin-bottom:32px; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#f0974a,#e05a2a); border-radius:2px; width:0%; transition:width 0.3s; }
        .question-card { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:20px; padding:32px 24px; margin-bottom:24px; border:1px solid rgba(255,255,255,0.1); }
        .question-number { font-size:14px; color:rgba(255,255,255,0.4); margin-bottom:16px; }
        .question-text { font-size:20px; font-weight:500; line-height:1.5; margin-bottom:32px; }
        .slider-container { padding:0 4px; }
        .slider-labels { display:flex; justify-content:space-between; font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:12px; }
        .slider { width:100%; -webkit-appearance:none; appearance:none; height:6px; background:rgba(255,255,255,0.15); border-radius:3px; outline:none; }
        .slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:28px; height:28px; background:#f0974a; border-radius:50%; cursor:pointer; box-shadow:0 2px 8px rgba(240,151,74,0.4); }
        .slider-values { display:flex; justify-content:space-between; font-size:14px; color:rgba(255,255,255,0.5); margin-top:8px; padding:0 2px; }
        .nav-buttons { display:flex; gap:12px; margin-top:32px; }
        .nav-btn { flex:1; padding:14px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; }
        .nav-btn.primary { background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; }
        .nav-btn.secondary { background:rgba(255,255,255,0.1); color:#fff; }
        .nav-btn:disabled { opacity:0.3; cursor:not-allowed; }
        .answer-hint { text-align:center; font-size:12px; color:rgba(255,255,255,0.3); margin-top:16px; }
    </style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="question-card">
    <div class="question-number" id="questionNumber"></div>
    <div class="question-text" id="questionText"></div>
    <div class="slider-container">
        <div class="slider-labels"><span>完全不符合</span><span>完全符合</span></div>
        <input type="range" min="1" max="5" value="3" class="slider" id="answerSlider">
        <div class="slider-values"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>
    </div>
    <div class="answer-hint" id="answerHint">当前选择：中等</div>
</div>
<div class="nav-buttons">
    <button class="nav-btn secondary" id="prevBtn" disabled>← 上一题</button>
    <button class="nav-btn primary" id="nextBtn">下一题 →</button>
</div>
<script src="questions.js"></script>
<script>
// ========== 全局变量 ==========
var currentIndex = 0;
var answers = new Array(questions.length).fill(3);
var questionNumber = document.getElementById('questionNumber');
var questionText = document.getElementById('questionText');
var answerSlider = document.getElementById('answerSlider');
var answerHint = document.getElementById('answerHint');
var prevBtn = document.getElementById('prevBtn');
var nextBtn = document.getElementById('nextBtn');
var progressFill = document.getElementById('progressFill');

// ========== 保存进度到 localStorage ==========
function saveProgress() {
    var progress = {
        answers: answers,
        currentIndex: currentIndex,
        timestamp: new Date().toISOString()
    };
    localStorage.setItem('relationship-lab-progress', JSON.stringify(progress));
    console.log('💾 进度已保存', { currentIndex, answers: answers.slice(0, 5) + '...' });
}

// ========== 加载进度 ==========
function loadProgress() {
    var saved = localStorage.getItem('relationship-lab-progress');
    if (saved) {
        return JSON.parse(saved);
    }
    return null;
}

// 从结果页返回时清除旧进度
if (document.referrer && document.referrer.includes('result.html')) {
    localStorage.removeItem('relationship-lab-progress');
    console.log('🗑️ 从结果页返回，清除旧进度');
}

// 断点续答
var savedProgress = loadProgress();
if (savedProgress) {
    var shouldRestore = confirm('检测到上次未完成的测试，是否从中断处继续？');
    if (shouldRestore) {
        answers = savedProgress.answers;
        currentIndex = savedProgress.currentIndex;
        console.log('🔄 恢复进度', { currentIndex, answersLength: answers.length });
    } else {
        localStorage.removeItem('relationship-lab-progress');
    }
}

// ========== 更新提示文字 ==========
function updateHint(value) {
    var hintText = '';
    if (value == 1) hintText = '完全不符合';
    else if (value == 2) hintText = '不太符合';
    else if (value == 3) hintText = '中等';
    else if (value == 4) hintText = '比较符合';
    else if (value == 5) hintText = '完全符合';
    answerHint.textContent = '当前选择：' + hintText;
}

// ========== 渲染当前题目 ==========
function renderQuestion() {
    var q = questions[currentIndex];
    var percent = ((currentIndex + 1) / questions.length) * 100;
    progressFill.style.width = percent + '%';
    questionNumber.textContent = '第 ' + (currentIndex + 1) + ' 题 / 共 ' + questions.length + ' 题';
    questionText.textContent = q.text;
    
    // 从 answers 数组中读取当前题目的答案
    var currentAnswer = answers[currentIndex];
    answerSlider.value = currentAnswer;
    updateHint(currentAnswer);
    
    prevBtn.disabled = (currentIndex === 0);
    
    if (currentIndex === questions.length - 1) {
        nextBtn.textContent = '查看结果 →';
    } else {
        nextBtn.textContent = '下一题 →';
    }
}

// ========== 监听滑块变化（实时更新 answers 数组）==========
answerSlider.addEventListener('input', function() {
    var newValue = parseInt(this.value);
    answers[currentIndex] = newValue;
    updateHint(newValue);
    saveProgress();  // 每次滑动都保存
    console.log('📝 第', currentIndex + 1, '题答案更新为', newValue);
});

// ========== 上一题 ==========
prevBtn.addEventListener('click', function() {
    if (currentIndex > 0) {
        // 先保存当前答案
        answers[currentIndex] = parseInt(answerSlider.value);
        saveProgress();
        currentIndex--;
        renderQuestion();
    }
});

// ========== 下一题 / 提交 ==========
nextBtn.addEventListener('click', function() {
    // 保存当前答案
    answers[currentIndex] = parseInt(answerSlider.value);
    saveProgress();
    
    if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
    } else {
        // 最后一道题，计算得分并跳转
        console.log('🎯 提交答案，最终 answers:', answers);
        
        // 计算三个维度的得分
        var dim1Score = 0, dim2Score = 0, dim3Score = 0;
        questions.forEach(function(q, index) {
            var score = answers[index];
            if (q.reverse) score = 6 - score;
            if (q.dimension === 1) dim1Score += score;
            else if (q.dimension === 2) dim2Score += score;
            else if (q.dimension === 3) dim3Score += score;
        });
        
        var resultData = {
            dim1: dim1Score,
            dim2: dim2Score,
            dim3: dim3Score,
            timestamp: new Date().toISOString()
        };
        
        // 保存结果到 localStorage
        localStorage.setItem('relationship-lab-result', JSON.stringify(resultData));
        
        // 同时保存 answers 数组供深度报告使用
        localStorage.setItem('relationship-lab-answers', JSON.stringify(answers));
        
        // 生成跳转 URL
        var encoded = btoa(dim1Score + ',' + dim2Score + ',' + dim3Score);
        var params = new URLSearchParams(window.location.search);
        var partnerParam = params.get('partner');
        var resultUrl = 'result.html?scores=' + encoded;
        if (partnerParam) resultUrl += '&partner=' + encodeURIComponent(partnerParam);
        
        console.log('🏁 跳转到结果页', resultUrl);
        window.location.href = resultUrl;
    }
});

// ========== 初始化 ==========
renderQuestion();
console.log('✅ 测试页面初始化完成，题目数量：', questions.length);
</script>
</body>
</html>
