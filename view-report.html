<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逐题解读 · 情感出厂设置</title>
    <style>
        * { box-sizing: border-box; }
        body { margin:0; padding:20px; background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 100%); min-height:100vh; font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif; color:#fff; }
        .container { max-width:700px; margin:0 auto; }
        .card { background:rgba(255,255,255,0.05); border-radius:20px; padding:24px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1); }
        .input-group { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
        .input-group input { flex:3; padding:14px 18px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:#fff; font-size:16px; outline:none; }
        .input-group input::placeholder { color:rgba(255,255,255,0.4); }
        .input-group button { flex:1; padding:14px 18px; border-radius:12px; border:none; background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; font-size:16px; font-weight:600; cursor:pointer; }
        .tag { display:inline-block; background:linear-gradient(135deg,#f0974a,#e05a2a); padding:6px 20px; border-radius:100px; font-size:14px; font-weight:600; margin-bottom:8px; }
        .question-block { margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.08); }
        .question-text { font-size:16px; font-weight:600; margin-bottom:10px; line-height:1.5; color:#fff; }
        .answer-badge { display:inline-block; background:rgba(240,151,74,0.2); border-radius:20px; padding:4px 14px; font-size:13px; margin-bottom:12px; }
        .insight { font-size:14px; line-height:1.6; color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.03); padding:12px; border-radius:12px; margin-top:8px; }
        .copy-btn { background:rgba(240,151,74,0.2); border:1px solid #f0974a; border-radius:20px; padding:6px 14px; font-size:13px; color:#f0974a; cursor:pointer; }
        .flex-between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
        .xhs-card { background:rgba(240,151,74,0.08); border-radius:16px; padding:16px; margin:20px 0 0; text-align:center; border:1px solid rgba(240,151,74,0.3); }
        .btn-xhs { background:rgba(240,151,74,0.2); border:1px solid #f0974a; border-radius:20px; padding:8px 20px; font-size:14px; color:#f0974a; cursor:pointer; margin-top:10px; display:inline-block; }
        .summary-card { background:rgba(240,151,74,0.08); border-left:4px solid #f0974a; }
        .summary-title { font-size:20px; font-weight:700; margin-bottom:12px; color:#f0974a; }
        .summary-text { font-size:15px; line-height:1.75; color:rgba(255,255,255,0.9); }
        .loading { text-align:center; padding:60px 0; color:rgba(255,255,255,0.6); }
        .error-box { background:rgba(240,151,74,0.15); border-radius:16px; padding:24px; text-align:center; margin:20px 0; }
        .btn-retry { background:linear-gradient(135deg,#f0974a,#e05a2a); border:none; padding:12px 24px; border-radius:30px; color:#fff; font-weight:600; cursor:pointer; margin-top:16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card" style="text-align:center;">
        <div style="font-size:36px; margin-bottom:8px;">📖</div>
        <h1 style="margin:0 0 8px 0;">逐题深度解读</h1>
        <p style="color:rgba(255,255,255,0.6); margin-bottom:24px;">输入你的报告编号，查看每道题的个性化分析</p>
        <div class="input-group">
            <input type="text" id="reportCode" placeholder="例如: REL-RSPL">
            <button id="searchBtn">🔍 查询报告</button>
        </div>
    </div>
    <div id="resultArea"></div>
</div>

<script>
// 男生版题目库（22题）
const QUESTIONS = [
    { id: 1, text: "感到烦躁或低落的时候，我第一反应是给自己找点事做，比如工作、打游戏、刷视频，让自己忙起来不去想它。", dimension: 1 },
    { id: 2, text: "情绪上来的那个当下，我通常只觉得心里乱糟糟的，说不清楚自己到底是生气、委屈还是失望。", dimension: 1 },
    { id: 3, text: "别人问我“你怎么了”，我的第一反应是回一句“没什么”，其实心里是有事的。", dimension: 1 },
    { id: 4, text: "一天过得不咸不淡，什么大事都没发生，心里却有种说不清的空落落。这种感觉我通常不会细想，告诉自己早点睡，明天就好了。", dimension: 1 },
    { id: 5, text: "和伴侣吵完架的当下，我说不清自己到底怎么了。总要过好几个小时，甚至好几天，才慢慢回过味来，原来自己当时是觉得受伤了，或者被忽视了。", dimension: 1 },
    { id: 6, text: "我打心底里觉得，一个大男人老琢磨自己开不开心，挺没出息的。", dimension: 1 },
    { id: 7, text: "我能察觉到，我对自己说话的方式，往往比对别人说话要刻薄得多。", dimension: 1 },
    { id: 8, text: "伴侣情绪一上来，冲我问“你心里到底在想什么”，我脑子常常一下子就空了。不是不想说，是真不知道该从哪儿说起。", dimension: 1 },
    { id: 9, text: "伴侣心情不好的时候，我经常摸不准她到底是想让我帮忙出主意，还是就想让我安安静静听她说完。", dimension: 2 },
    { id: 10, text: "伴侣在我面前哭或者发脾气，我第一反应不是心疼，而是心里很烦躁，压力很大，只想赶紧让这个场面结束。", dimension: 2 },
    { id: 11, text: "伴侣跟我倒完苦水，我通常会帮她分析分析，给几条建议，然后就觉得这件事算处理完了。", dimension: 2 },
    { id: 12, text: "我很难单从伴侣说话的语气、脸上的表情或者她的沉默里，判断出她是生气了、难过了，还是单纯累了。", dimension: 2 },
    { id: 13, text: "伴侣情绪崩溃的时候，除了在旁边默默陪着，我完全不知道还能怎么安慰她，常常觉得很无力，手都不知道往哪儿放。", dimension: 2 },
    { id: 14, text: "伴侣跟我聊她的心事，我会不自觉地说起自己类似的经历，聊着聊着，话题就慢慢变成了我在说。", dimension: 2 },
    { id: 15, text: "一次不愉快的谈话结束以后，我不会再主动把这件事翻出来聊，觉得过去了就翻篇了，再提对谁都不好。", dimension: 2 },
    { id: 16, text: "一想到婚姻，我脑子里最先蹦出来的词是责任、养家、别让父母操心、把这个人生阶段的任务完成好。", dimension: 3 },
    { id: 17, text: "在一段长久的关系里，除了把经济基础打好、不做出格的事，我不太说得出来自己还能提供什么别的价值。", dimension: 3 },
    { id: 18, text: "我追求或者维持一段关系，更多是因为年纪到了、身边人都结了、家里也该有个交代了，而不是自己心里真的有多渴望。", dimension: 3 },
    { id: 19, text: "对我来说，被一个人需要的感觉很踏实，比我主动想和她在一起的那种感觉，更让我确定、更有安全感。", dimension: 3 },
    { id: 20, text: "我心里隐隐觉得，爱情这东西不太实在。它总得有点实际用处——比如一起养家、生孩子、照顾老人——才值得花时间花精力去经营。", dimension: 3 },
    { id: 21, text: "与其说我有多渴望一段感情，不如说我更害怕老了还是一个人，那种孤独和难堪想起来就发慌。", dimension: 3 },
    { id: 22, text: "我能想象婚后日子会慢慢变淡，甚至彼此都有点倦了，但我对自己能不能经营好它、让这个家一直有点温度，心里是没底的。", dimension: 3 }
];

function getInsight(score, dimension) {
    if (score >= 4) {
        if (dimension === 1) return "🔴 你选择了「符合」。这说明你习惯用逃避来应对情绪，长期下来可能会让你离自己的感受越来越远。试着在下一次情绪上来时，先停下来问自己一句：“我现在是什么感觉？”";
        if (dimension === 2) return "🔴 你选择了「符合」。这说明你在共情回应上常常感到困惑。下次她情绪不好时，试着先问一句：“你想让我听，还是想一起想办法？”";
        if (dimension === 3) return "🔴 你选择了「符合」。这说明你的爱的驱动力更多来自责任。问自己：“如果不考虑任何人的期待，我想和她一起做什么？”";
        return "🔴 这个模式值得你关注。";
    } else if (score <= 2) {
        if (dimension === 1) return "🟢 你选择了「不符合」。这说明你对自己情绪的觉察已经有一定的能力，这是很多男性缺失的宝贵能力。";
        if (dimension === 2) return "🟢 你选择了「不符合」。这说明你在共情回应上已经比较自然，这是你在关系中的核心优势。";
        if (dimension === 3) return "🟢 你选择了「不符合」。这说明你的爱的驱动力来自内心渴望，这是关系中最温暖的燃料。";
        return "🟢 你已经在这方面做得不错了。";
    } else {
        if (dimension === 1) return "🟡 你选择了中等分数。你有时能觉察情绪，有时还是会逃避。你可以通过每天2分钟的“自我扫描”练习来提升。";
        if (dimension === 2) return "🟡 你选择了中等分数。你在共情上有时能接住，有时会卡住。你正在新旧模式之间切换。";
        if (dimension === 3) return "🟡 你选择了中等分数。你内心既有渴望也有犹豫，你已经意识到了这一点，这是改变的第一步。";
        return "🟡 这个描述对你来说部分符合，可以根据自己的感受决定是否需要调整。";
    }
}

function getSummary(personality) {
    const summaries = {
        '全面冻结型': `你的情感世界像一座被冰封的湖面，表面平静，下面藏着很多没有说出口的情绪。\n\n你习惯用“忙起来”来应对一切——情绪来了就工作、打游戏、刷视频，总之不要停下来。这个本领是你从小练成的，也许是因为你见过身边的大人用沉默和忙碌处理一切，也许是因为你听过“男儿有泪不轻弹”。这套策略帮你活到了现在，但它有一个代价：你越来越听不见自己内心的声音。\n\n你可以从一件很小的事开始：下次感到烦躁时，不急着刷手机，先闭上眼睛10秒钟，问自己：“我现在身体哪个地方有感觉？”不需要答案，只是问。这一步，就已经是改变了。`,
        '孤独的付出者': `你是那种“做得多，说得少”的人。你觉得自己已经扛起了很多——努力工作、照顾家庭、不出格、不摆烂，为什么她还是觉得不够？\n\n问题不在你做没做，而在“爱的翻译器”出了故障。你表达关心的方式是抄起工具箱：她一烦，你就开始分析、给方案、帮她解决。你觉得自己在爱她，但她接收到的信号是“我在被修理”。\n\n改变可以从一个很小的动作开始：下次她说“今天好累”，你先别急着说“那我帮你做”，试着先说一句“听起来你今天确实不容易”。就这一句话，你们之间的频道就开始接通了。`,
        '孤独的阅读者': `你是少数能“读到”她情绪的男性。她脸上的微表情、语气里的变化、甚至沉默的不同类型，你都能分辨。这是很多人没有的天赋。\n\n但你的困境是：读到了，却不知道怎么回应。你像是一个听力极好的人，却不会说话。这不是你的错，是你从小到大没有人教过你“听见之后该怎么做”。\n\n你不需要成为情绪专家。你只需要做一件事：下次你读到她有情绪时，试着说出你读到的——“我感觉你今天有点累，是不是？”不解决，只是确认。你会发现，这个动作本身，就已经是爱了。`,
        '未启程的旅人': `你是这几类中“基础最好”的人。你能识别自己的情绪，也能感知她的需要。按理说，你应该是关系中最游刃有余的那个。\n\n但你有一个自己都没意识到的坎：你不太确定自己为什么要在关系里。你觉得自己一个人也可以过得挺好，甚至有时候觉得关系是一种负担。\n\n你可以试着问自己一个不问“应该”的问题：如果抛开所有责任、别人的期待、年龄的压力，我想和另一个人一起做什么？找到那个微小的“想”，你就找到了出发的理由。`,
        '责任型守护者': `你是关系里的“承重墙”。你扛起了经济、扛起了责任、扛起了“不让家人操心”。你是一个好丈夫、好父亲、好儿子——至少你自己是这样要求自己的。\n\n但你有过一个瞬间吗？半夜醒来，或者一个人开车的时候，心里会冒出一个很小很小的声音：“我快乐吗？”那个声音很快就被你压下去了——因为你想，快乐不重要，责任才重要。\n\n你可以给自己装一个补丁：每个月做一件“不为什么”的事——不是为了家庭、不是为了责任、不是为了面子，只是因为你想。你会发现，“想”和“应当”出来的爱，味道是不一样的。`,
        '双向通达型': `你是少数已经走通这条路的人。你能看见自己的情绪，也能接住她的情绪；你爱一个人，不是因为她需要你，而是因为你想要靠近她。这非常难得。\n\n但我想提醒你一件事：走得顺的时候，最容易忽略的是“对方是不是也在用她的方式爱你”。因为你太会爱了，有时候你会不自觉地承担更多。\n\n给你的建议不是做得更多，而是偶尔停下来，看看她会不会主动走向你。你不需要一直做那个举灯的人，偶尔也可以站在光里，让她来找你。`,
        '矛盾探索者': `你不是不想，是不知道该怎么办。这是你现在最真实的状态。你不是冷漠，你也不是不爱，你只是在“旧的模式不管用”和“新的模式还没学会”之间卡住了。\n\n你可以先做一件事：不再要求自己“立刻做对”。允许自己笨拙，允许自己说错话。下次不知道该怎么回应时，就直接说：“我现在不太知道怎么接你的话，但我想陪着你。”这句话本身，就已经比90%的男性走得远了。`,
        '探索者': `你的画像还没有完全定型，这意味着你还在成长和变化的路上。\n\n你已经迈出了最重要的一步。接下来，你可以从每天2分钟的“自我扫描”开始，慢慢练习看见自己的情绪。不需要改变，只需要看见。`
    };
    return summaries[personality] || summaries['矛盾探索者'];
}

const SUPABASE_URL = 'https://ptadbowmnbytfwoisrup.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VTrW3OmOe2al2vxfs85QGA_Tc_G3wDI';

async function fetchReport(code) {
    let normalizedCode = code.trim().toUpperCase();
    if (!normalizedCode.startsWith('REL-')) {
        if (normalizedCode.startsWith('PRT-')) normalizedCode = normalizedCode.replace('PRT-', 'REL-');
        else if (!normalizedCode.includes('-')) normalizedCode = 'REL-' + normalizedCode;
    }
    const response = await fetch(`${SUPABASE_URL}/rest/v1/answers?code=eq.${encodeURIComponent(normalizedCode)}`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await response.json();
    if (!data || data.length === 0) return null;
    return data[0];
}

function renderQuestions(answers) {
    let html = '';
    for (let i = 0; i < QUESTIONS.length; i++) {
        const q = QUESTIONS[i];
        const answer = answers[i] !== undefined ? answers[i] : 3;
        const insight = getInsight(answer, q.dimension);
        html += `<div class="question-block">
            <div class="question-text">${q.id}. ${q.text}</div>
            <div class="answer-badge">你的答案：${answer} / 5（${answer === 1 ? '完全不符合' : answer === 2 ? '不太符合' : answer === 3 ? '中等' : answer === 4 ? '比较符合' : '完全符合'}）</div>
            <div class="insight">${insight}</div>
        </div>`;
    }
    return html;
}

document.getElementById('searchBtn').addEventListener('click', async () => {
    const rawCode = document.getElementById('reportCode').value.trim();
    if (!rawCode) {
        document.getElementById('resultArea').innerHTML = '<div class="card error-box">请输入报告编号</div>';
        return;
    }
    document.getElementById('resultArea').innerHTML = '<div class="card loading">⏳ 正在查询报告...</div>';
    const data = await fetchReport(rawCode);
    if (!data) {
        document.getElementById('resultArea').innerHTML = `
            <div class="error-box">
                <div style="font-size:28px; margin-bottom:12px;">😢</div>
                <div style="font-size:18px; font-weight:600; margin-bottom:8px;">未找到报告</div>
                <div style="font-size:14px;">报告编号：<strong>${rawCode.toUpperCase()}</strong></div>
                <div style="font-size:13px; margin-top:16px;">可能原因：编号输入错误或测试数据未保存成功</div>
                <button class="btn-retry" onclick="location.reload()">重新查询</button>
            </div>
        `;
        return;
    }
    const answers = data.answers_json || [];
    const personality = data.personality || '探索者';
    const dim1 = data.dim1 || 0, dim2 = data.dim2 || 0, dim3 = data.dim3 || 0;
    const code = data.code;
    let html = `<div class="card">
        <div class="tag">${personality}</div>
        <div class="flex-between">
            <div style="font-size:22px; font-weight:700;">📖 逐题深度解读</div>
            <button class="copy-btn" id="copyCodeBtn">📋 复制编号 ${code}</button>
        </div>
        <div style="color:rgba(255,255,255,0.5); margin:8px 0;">编号：${code}</div>
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
            <span style="background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:20px;">自我情绪 ${dim1}/40</span>
            <span style="background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:20px;">共情回应 ${dim2}/35</span>
            <span style="background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:20px;">爱的动力 ${dim3}/35</span>
        </div>`;
    html += renderQuestions(answers);
    const summary = getSummary(personality);
    html += `<div class="card summary-card"><div class="summary-title">📝 给你的深度总结</div><div class="summary-text">${summary.replace(/\n/g, '<br>')}</div></div>`;
    html += `<div class="xhs-card"><div style="font-size:24px;">📕</div><div>如果这份报告对你有帮助</div><div>欢迎关注小红书 <b style="color:#f0974a;">@关系实验室</b></div><div>小红书号：9165138712</div><button class="btn-xhs" id="followXHSBtn">📋 复制编号，打开小红书</button></div>`;
    html += `</div>`;
    document.getElementById('resultArea').innerHTML = html;
    document.getElementById('copyCodeBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(code); alert('✅ 已复制'); });
    document.getElementById('followXHSBtn')?.addEventListener('click', () => { navigator.clipboard.writeText(code); alert('✅ 已复制，请打开小红书关注 @关系实验室'); window.open('https://www.xiaohongshu.com/user/profile/9165138712', '_blank'); });
});

const urlCode = new URLSearchParams(window.location.search).get('code');
if (urlCode) { document.getElementById('reportCode').value = urlCode; document.getElementById('searchBtn').click(); }
</script>
</body>
</html>
