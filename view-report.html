    const info = insights[qid];

}

        '责任型守护者': `你是关系里的“承重墙”。但你有过一个瞬间吗？心里会冒出一个很小很小的声音：“我快乐吗？”你可以给自己装一个补丁：每个月做一件“不为什么”的事——不是为了家庭、不是为了责任、不是为了面子，只是因为你想。`,
        '双向通达型': `你是少数已经走通这条路的人。但我想提醒你：因为你太会爱了，有时候你会不自觉地承担更多。给你的建议不是做得更多，而是偶尔停下来，看看她会不会主动走向你。`,
        '矛盾探索者': `你不是不想，是不知道该怎么办。你在“旧的模式不管用”和“新的模式还没学会”之间卡住了。你可以先做一件事：不再要求自己“立刻做对”。允许自己笨拙，允许自己说错话。`,

    };
    return summaries[personality] || summaries['矛盾探索者'];

const SUPABASE_URL = 'https://ptadbowmnbytfwoisrup.supabase.co';

async function fetchReport(code) {
    let normalizedCode = code.trim().toUpperCase();
    if (!normalizedCode.startsWith('REL-')) {
        if (normalizedCode.startsWith('PRT-')) normalizedCode = normalizedCode.replace('PRT-', 'REL-');
        else if (!normalizedCode.includes('-')) normalizedCode = 'REL-' + normalizedCode;
    }
    const response = await fetch(`${SUPABASE_URL}/rest/v1/answers?code=eq.${encodeURIComponent(normalizedCode)}`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await response.json();
    if (!data || data.length === 0) return null;
    return data[0];
}

function renderQuestions(answers) {
    let html = '';
    for (let i = 0; i < QUESTIONS.length; i++) {
        const q = QUESTIONS[i];
        const answer = answers[i] !== undefined ? answers[i] : 3;
        const insight = getInsight(answer, q.id, q.text);
        html += `<div class="question-block">
            <div class="question-text">${q.id}. ${q.text}</div>
            <div class="answer-badge">你的答案：${answer} / 5（${answer === 1 ? '完全不符合' : answer === 2 ? '不太符合' : answer === 3 ? '中等' : answer === 4 ? '比较符合' : '完全符合'}）</div>
            <div class="insight">${insight}</div>
        </div>`;
    }
    return html;
}
