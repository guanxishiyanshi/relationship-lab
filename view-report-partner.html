    <style>
        * { box-sizing: border-box; }

        .copy-btn { background:rgba(224,90,138,0.2); border:1px solid #e05a8a; border-radius:20px; padding:6px 14px; font-size:13px; color:#e05a8a; cursor:pointer; }
        .flex-between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
        .xhs-card { background:rgba(224,90,138,0.08); border-radius:16px; padding:16px; margin:20px 0 0; text-align:center; border:1px solid rgba(224,90,138,0.3); }
        .btn-xhs { background:rgba(224,90,138,0.2); border:1px solid #e05a8a; border-radius:20px; padding:8px 20px; font-size:14px; color:#e05a8a; cursor:pointer; margin-top:10px; display:inline-block; }
        .summary-card { background:rgba(224,90,138,0.08); border-left:4px solid #e05a8a; }
        .summary-title { font-size:20px; font-weight:700; margin-bottom:12px; color:#e05a8a; }
        .summary-text { font-size:15px; line-height:1.75; color:rgba(255,255,255,0.9); }
        .loading { text-align:center; padding:60px 0; color:rgba(255,255,255,0.6); }
        .error-box { background:rgba(224,90,138,0.15); border-radius:16px; padding:24px; text-align:center; margin:20px 0; }
        .btn-retry { background:linear-gradient(135deg,#e05a8a,#c04a6a); border:none; padding:12px 24px; border-radius:30px; color:#fff; font-weight:600; cursor:pointer; margin-top:16px; }
    </style>

<body>
<div class="container">
    <div class="card" style="text-align:center;">
        <div style="font-size:36px; margin-bottom:8px;">🌸</div>

        <p style="color:rgba(255,255,255,0.6); margin-bottom:24px;">输入你的报告编号，查看每道题的个性化分析</p>

</div>

<script>
// 女生版题目库（40题）
const PARTNER_QUESTIONS = [
    { id: 1, text: "我们之间突然安静下来，我第一反应是：是不是我又做错什么了。", dimension: 1 },
    { id: 2, text: "我能感觉到，他有时候不说话，是在心里组织语言，不是在对我冷暴力。", dimension: 1 },
    { id: 3, text: "他沉默超过十分钟，我心里就会冒出一个声音催我去问问他到底怎么了。", dimension: 1 },
    { id: 4, text: "他跟兄弟在一起有说有笑，一回到我身边话就少了，这让我心里有点发酸。", dimension: 1 },
    { id: 5, text: "事后冷静下来想想，我经常把他的沉默想得太严重了，他可能真的只是累了。", dimension: 1 },
    { id: 6, text: "小时候家里有人生气就不说话，那种安静让我到现在都有点紧张。", dimension: 1 },
    { id: 7, text: "他一沉默，我就会想到之前那些还没解开的疙瘩，觉得他是不是还在为那些事不高兴。", dimension: 1 },
    { id: 8, text: "他说'没什么'的时候，我下意识觉得他其实有事，只是不愿意跟我讲。", dimension: 1 },
    { id: 9, text: "我能分辨出他那种'在想事情'的安静，和那种'在回避'的安静，周围空气的味道都不一样。", dimension: 1 },
    { id: 10, text: "他超过半小时没回我消息，我会反复点开手机，脑子里忍不住编出各种剧情。", dimension: 1 },
    { id: 11, text: "我嘴上说'没事'，其实心里悄悄希望他能听出来我有事。", dimension: 2 },
    { id: 12, text: "当我直接把需求说清楚，他其实是很愿意去做的。", dimension: 2 },
    { id: 13, text: "我需要他做什么时，会跟他讲得很具体：什么时间、在哪儿、需要他干嘛。", dimension: 2 },
    { id: 14, text: "我有时候会把好几件不舒服的事攒在心里，最后挑一件最安全的讲出来。", dimension: 2 },
    { id: 15, text: "我觉得如果他真的在乎我，有些事不用我开口他也应该能注意到。", dimension: 2 },
    { id: 16, text: "身体不舒服或者心情很差的时候，反而更开不了口说'我需要你帮我'。", dimension: 2 },
    { id: 17, text: "吵起来的时候，我会忍不住说'你从来不……''你总是……'这种话。", dimension: 2 },
    { id: 18, text: "在外面跟朋友同事我能说会道，但回到家对着他，有些话反而堵在嗓子眼。", dimension: 2 },
    { id: 19, text: "我经常在心里把要说的话排练好几遍，真见了他又咽回去了。", dimension: 2 },
    { id: 20, text: "当我开始为一件事发牢骚，其实真正想说的是另一件更重的事，只是还没准备好开口。", dimension: 2 },
    { id: 21, text: "他下班回来顺手给我带一杯爱喝的，比一句'我爱你'更让我觉得被惦记。", dimension: 3 },
    { id: 22, text: "我需要他认认真真听我说话，而不是一边刷手机一边嗯嗯地敷衍。", dimension: 3 },
    { id: 23, text: "他能记住我不经意说过的小事，这让我觉得自己在他心里有个特别的位置。", dimension: 3 },
    { id: 24, text: "他踏踏实实为家挣钱，嘴上不说甜话，我也能感觉到了他的在乎。", dimension: 3 },
    { id: 25, text: "我需要他偶尔什么都不为，就安安静静抱我一会儿。", dimension: 3 },
    { id: 26, text: "我情绪崩了的时候，他不用帮我解决什么，在旁边安静陪着就好。", dimension: 3 },
    { id: 27, text: "两个人能坐下来好好聊一次天，对我来说是关系里很重要的事。", dimension: 3 },
    { id: 28, text: "他主动去洗碗拖地的时候，我觉得他在用他的方式说爱我。", dimension: 3 },
    { id: 29, text: "我希望他能偶尔给我写几句话，哪怕就贴在冰箱上。", dimension: 3 },
    { id: 30, text: "想一想小时候，爱在你家里是怎么被表达的？——那种方式，现在你还期待吗？", dimension: 3 },
    { id: 31, text: "吵完架我通常会先哭一场，哭完会想去找他，或者等他来找我。", dimension: 4 },
    { id: 32, text: "他说翻篇就翻篇了，但我心里那口气还没顺过来。", dimension: 4 },
    { id: 33, text: "我能感觉到，他有时候也想和好，只是拉不下脸先开口。", dimension: 4 },
    { id: 34, text: "吵完架我一个人躺着，脑子里会把当时说的话重放好几遍，越想越难受。", dimension: 4 },
    { id: 35, text: "只要能说开，吵一架其实没什么，总比两个人都憋着装没事好。", dimension: 4 },
    { id: 36, text: "和好之后，我需要他做点什么让我确定我们真的好了，比如拉一下我的手，或者带我出去吃顿好的。", dimension: 4 },
    { id: 37, text: "我有时候故意不先开口，就想看看他会不会主动来找我。", dimension: 4 },
    { id: 38, text: "吵完架我会把整个过程都跟闺蜜讲一遍，讲完心里能松快一大截。", dimension: 4 },
    { id: 39, text: "最受不了的是，刚吵完架他转身就能呼呼大睡，留我一个人瞪着天花板。", dimension: 4 },
    { id: 40, text: "上次闹别扭，最后是谁先破的冰？——这种事在我们之间发生的次数，记不清了。", dimension: 4 }
];

// ========== 每题专属解读（高/中/低三档，关联男生版） ==========
function getInsight(score, qid, text) {
    const insights = {
        1: { high: "🔴 你容易把他的安静当成对自己的否定。其实男人沉默大多只是累了（男生版第4题）。下次先对自己说：“这不一定是我的问题，他可能只是累了。”", mid: "🟡 你有时会多想，有时能放松。可以和他约定：“如果你只是需要安静，就说‘我想自己待半小时’。”", low: "🟢 你能给他留出空间，不把他的沉默扛在自己身上。这份松弛感很珍贵。" },
        2: { high: "🔴 你能察觉到他在组织语言，不是冷暴力。这很了不起。但当你情绪不好时，你可能还是会怀疑（男生版第8题）。可以相信你的直觉，也给他一点时间。", mid: "🟡 你多数时候能分辨，偶尔会多想。你可以直接问：“你是在想事情，还是生我的气？”", low: "🟢 你非常清楚他的沉默类型，几乎不会误解。这份能力让他感到被理解。" },
        3: { high: "🔴 他沉默超过十分钟你就会催他。这让他更有压力。男生版第8题描述了这种感觉。试着给他15分钟，不打扰，他自己会回来。", mid: "🟡 你有时会催，有时能忍住。可以给自己设一个闹钟，15分钟后再去问。", low: "🟢 你能耐心等待他消化完，不催促。这份耐心让他感到安全。" },
        4: { high: "🔴 他跟兄弟有说有笑，回家话少，你心里发酸。这不是他不爱你，是他已经把社交能量用完了。男生版第4题也描述了这种状态。", mid: "🟡 你有时会在意，有时能理解。可以观察他是不是只有在外面累了才这样。", low: "🟢 你不太会拿他和别人比较。你知道他只是充电方式不同。" },
        5: { high: "🔴 你能在事后反思自己把沉默想得太严重。这份觉察很宝贵。下次可以当场问自己：“他现在真的在生我的气吗？”", mid: "🟡 你有时会想太严重，有时能冷静。可以写下来：上次他沉默，后来是什么情况？", low: "🟢 你很少过度解读他的沉默。你们之间很少因为误会吵架。" },
        6: { high: "🔴 小时候家里有人生气就不说话，那种安静让你到现在都紧张。这不是你的错，是过去的影子。你可以告诉他：“我小时候家里有人生气就不说话，所以我一安静就会害怕。”", mid: "🟡 你有时会被过去的模式影响，有时能跳出来。可以试着在紧张时深呼吸，提醒自己“现在是现在”。", low: "🟢 你已经走出了童年的影响。他的沉默不再勾起你的恐惧。" },
        7: { high: "🔴 他一沉默，你就会想到之前没解开的疙瘩。这会让旧账翻不完。男生版第15题也提到翻篇的差异。试着在平静时一起清理一次疙瘩。", mid: "🟡 你有时会联想，有时能就事论事。可以问他：“你现在的沉默，是和之前那件事有关吗？”", low: "🟢 你能把这次沉默和过去分开。这会让你们少很多内耗。" },
        8: { high: "🔴 他说“没什么”时你下意识觉得他有事。大部分时候你是对的，但追问会让他更不想说。你可以说：“如果你想说，我在这里。”", mid: "🟡 你有时会追问，有时会等。可以给他说：“不急，你想说的时候告诉我。”", low: "🟢 你相信他说的“没什么”，不强行拆穿。这份信任让他更愿意主动开口。" },
        9: { high: "🔴 你能分辨他安静的类型，甚至空气的味道都不一样。这是天赋。但别过度依赖直觉，偶尔也直接确认一下。", mid: "🟡 你多数能分辨，偶尔会错。错了也没关系，让他纠正你。", low: "🟢 你的直觉很准，而且你懂得用语言确认，不会过度解读。" },
        10: { high: "🔴 他超过半小时没回消息，你会编各种剧情。这太耗能了。男生版第1题也描述了逃避模式。你可以把手机放一边，去做一件自己的事。", mid: "🟡 你有时会焦虑，有时能转移注意力。可以试试：如果半小时没回，就先去洗澡或看书。", low: "🟢 你不太会因为没回消息而焦虑。你有自己的安全感来源。" },
        11: { high: "🔴 你在发送加密信号，但他收不到（男生版第3题）。男人读心能力普遍较弱。试着把“没事”换成“我有点不开心，等我一下”。", mid: "🟡 你有时直接说，有时等他自己发现。慢慢练习直接表达，会更轻松。", low: "🟢 你能直接说出需求，这是沟通中的顶级能力。他会非常感谢你的清晰。" },
        12: { high: "🔴 你知道说清楚后他愿意做。那就更要多说。你越直接，他越轻松。", mid: "🟡 你发现直接说他就会做，但有时还是忍不住等他猜。下次直接说，会更快。", low: "🟢 你总是直接说需求，他也总是愿意配合。你们的沟通模式很健康。" },
        13: { high: "🔴 你会说得很具体：什么时间、在哪儿、需要他干嘛。这是最高效的沟通方式。继续保持。", mid: "🟡 你多数时候会说清楚，偶尔含糊。可以提醒自己：越具体，他越不会出错。", low: "🟢 你的表达总是很清晰，他几乎不会误会。这是你们关系中的润滑剂。" },
        14: { high: "🔴 你会把好几件事攒在一起，最后挑一件最安全的讲。这会让真正的问题被淹没。试着在当天就说，哪怕只说一件。", mid: "🟡 你有时会攒，有时会立刻说。可以给自己一个原则：当天的事当天说。", low: "🟢 你很少积压情绪，有了不开心会及时说出来。这让你和他都轻松。" },
        15: { high: "🔴 你觉得他在乎就该主动注意到。但他可能真的注意不到（男生版第12题）。他需要你明确说出来。这不是不爱，是男女不同。", mid: "🟡 你时而期待他主动，时而觉得算了。可以列出三件小事告诉他：“如果你做到这些，我会觉得被爱。”", low: "🟢 你接受他的方式，不强求他变成另一个人。这种包容会让关系更轻松。" },
        16: { high: "🔴 身体不舒服或心情差时，你反而开不了口说“我需要你”。这可能是怕被拒绝。试着发一条消息：“今天很难受，你可以陪我一下吗？”", mid: "🟡 你有时会开口，有时会忍着。可以试试先说一半：“我今天不太好。”", low: "🟢 你在脆弱时能向他求助。这份信任会让你们更亲密。" },
        17: { high: "🔴 吵架时会说“你从来不……”“你总是……”。这会让对话升级为攻击。换成“这次我觉得……”。", mid: "🟡 你有时会用绝对化词语，有时能控制。可以提醒自己：把“从来不”换成“很少”。", low: "🟢 你吵架时也能就事论事，不翻旧账。这是非常成熟的能力。" },
        18: { high: "🔴 在外面能说会道，回家反而说不出口。这是因为你把最脆弱的自己留给了他。可以试试先从轻松的话题开始。", mid: "🟡 你有时在家更沉默，有时也能说。可以在外面先想好回家要说什么。", low: "🟢 你在家也能自如表达，不把情绪堵在外面。这让他看到真实的你。" },
        19: { high: "🔴 你在心里排练好几遍，见了他又咽回去。这是怕说错。可以先把想说的话写下来，让他看文字。", mid: "🟡 你有时会排练，有时直接说。可以给自己一个原则：排练不超过三遍，就说出来。", low: "🟢 你想到什么就说什么，不太会卡在喉咙里。这份直接让沟通很顺畅。" },
        20: { high: "🔴 你发牢骚时，真正想说的是另一件更重的事。这叫“绕路”。可以试着在牢骚后面加一句：“其实我在意的是……”", mid: "🟡 你有时会绕路，有时会直说。可以练习：发完牢骚后，自己追问一句“我真正想说的是什么？”", low: "🟢 你很少用牢骚试探，会直接说最在意的事。这让他少猜很多。" },
        21: { high: "🔴 他带一杯爱喝的比说“我爱你”更让你觉得被惦记。你的爱语是“行动”。可以告诉他：“你做的小事都会让我觉得被爱。”", mid: "🟡 你既在意行动，也在意言语。可以让他知道两种你都喜欢。", low: "🟢 你主要在意言语肯定，行动是加分项。让他知道怎么说你最能收到。" },
        22: { high: "🔴 你需要他认真听你说话，而不是刷手机。这是最基本的尊重。可以和他约定：“我们说话时，放下手机。”", mid: "🟡 你有时会忍，有时会提醒。可以轻轻说：“我想你看着我。”", low: "🟢 他从来不会在你说话时刷手机。你们有很好的倾听习惯。" },
        23: { high: "🔴 他能记住你不经意说过的小事，这让你觉得自己特别。这是爱的一种语言。多夸他，他会更愿意做。", mid: "🟡 他有时能记住，有时会忘。可以重复两次重要的事。", low: "🟢 你对被记住小事没有那么强的需求，你更在意其他表达方式。" },
        24: { high: "🔴 他踏实挣钱，不说甜话，你也能感觉到在乎。你的爱语包括“服务”。继续看见他的付出，也偶尔告诉他你需要甜话。", mid: "🟡 你既看重实际行动，也想要言语。可以让他知道：行动是基础，言语是加分。", low: "🟢 你主要看实际行动，甜话可有可无。这让他压力小很多。" },
        25: { high: "🔴 你需要他什么都不为，就安静抱你一会儿。这是情感充电。可以直接告诉他：“今天抱我五分钟。”", mid: "🟡 你有时想要拥抱，有时觉得不需要。可以主动走过去，靠着他。", low: "🟢 你对拥抱没有强烈需求，你更喜欢其他方式。" },

        '等待的信号灯': `你需要明确的承诺才能感到安心。你习惯用“等待”来表达爱，而他用“沉默”来表达爱。你可以走过去，平静地告诉他：“我需要你告诉我，我们还在一起。”这不是示弱，是在教他怎么爱你。`,
        '焦虑的独行者': `你一个人什么都可以，但希望有人让你不用这样。你的独立是一面盾牌，挡住了别人靠近你的路。你可以试着做一件危险的事：在你最需要的时候，说一次“我需要你”。`,

const SUPABASE_URL = 'https://ptadbowmnbytfwoisrup.supabase.co';

async function fetchReport(code) {
    let normalizedCode = code.trim().toUpperCase();
    if (!normalizedCode.startsWith('PRT-')) {
        if (normalizedCode.startsWith('REL-')) normalizedCode = normalizedCode.replace('REL-', 'PRT-');
        else if (!normalizedCode.includes('-')) normalizedCode = 'PRT-' + normalizedCode;
    }
    const response = await fetch(`${SUPABASE_URL}/rest/v1/answers?code=eq.${encodeURIComponent(normalizedCode)}`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await response.json();
    if (!data || data.length === 0) return null;
    return data[0];
}

function renderQuestions(answers) {
    let html = '';
    for (let i = 0; i < PARTNER_QUESTIONS.length; i++) {
        const q = PARTNER_QUESTIONS[i];
        const answer = answers[i] !== undefined ? answers[i] : 3;
        const insight = getInsight(answer, q.id, q.text);
        html += `<div class="question-block">
            <div class="question-text">${q.id}. ${q.text}</div>
            <div class="answer-badge">你的答案：${answer} / 5（${answer === 1 ? '完全不符合' : answer === 2 ? '不太符合' : answer === 3 ? '中等' : answer === 4 ? '比较符合' : '完全符合'}）</div>
            <div class="insight">${insight}</div>
        </div>`;
    }
    return html;
}
