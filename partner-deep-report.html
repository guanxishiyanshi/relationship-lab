<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整深度报告 · 爱的接收模式</title>
    <style>
        body { margin:0; padding:16px; background:linear-gradient(135deg,#1a0a28 0%,#2a1a4a 100%); min-height:100vh; font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif; color:#fff; }
        .container { max-width:420px; margin:0 auto; padding-bottom:40px; }
        .card { background:rgba(255,255,255,0.05); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
        .card-title { font-size:18px; font-weight:700; margin-bottom:12px; color:#e05a8a; }
        .card-text { font-size:15px; line-height:1.65; color:rgba(255,255,255,0.85); }
        .highlight-card { border:2px solid rgba(224,90,138,0.5); background:rgba(224,90,138,0.08); }
        .tag { display:inline-block; background:linear-gradient(135deg,#e05a8a,#c04a6a); padding:8px 24px; border-radius:100px; font-size:14px; font-weight:600; margin-bottom:16px; }
        h1 { font-size:28px; margin-bottom:8px; }
        .subtitle { font-size:14px; color:rgba(255,255,255,0.5); margin-bottom:24px; }
        .btn { display:block; width:100%; padding:16px; border-radius:12px; border:none; font-size:18px; font-weight:600; cursor:pointer; text-align:center; margin-top:24px; background:linear-gradient(135deg,#e05a8a,#c04a6a); color:#fff; }
        .btn-copy { background:rgba(224,90,138,0.2); border:1px solid #e05a8a; border-radius:20px; padding:10px 16px; font-size:14px; color:#e05a8a; cursor:pointer; margin-top:12px; width:100%; }
        .loading { text-align:center; padding:60px 0; font-size:18px; color:rgba(255,255,255,0.6); }
        .code-input-group { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
        .code-input-group input { flex:2; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:#fff; font-size:14px; outline:none; }
        .code-input-group button { flex:1; padding:12px; border-radius:12px; border:none; background:linear-gradient(135deg,#e05a8a,#c04a6a); color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
        .copy-btn { background:rgba(224,90,138,0.2); border:1px solid #e05a8a; border-radius:20px; padding:6px 14px; font-size:13px; color:#e05a8a; cursor:pointer; display:inline-block; margin-left:12px; }
        .flex-between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
        .xhs-card { background:rgba(224,90,138,0.1); border-radius:16px; padding:16px; margin:16px 0; text-align:center; }
    </style>
</head>
<body>
<div class="container" id="report">
    <div class="loading">✨ 正在生成你的完整深度报告…</div>
</div>

<script>
const SUPABASE_URL = 'https://ptadbowmnbytfwoisrup.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VTrW3OmOe2al2vxfs85QGA_Tc_G3wDI';

(async function() {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var isPaid = (params.get('unlock') === 'paid');

    if (!code) {
        document.getElementById('report').innerHTML = '<div class="card"><h2>🔒 未找到报告编号</h2><p>请从测试结果页进入。</p></div>';
        return;
    }

    let answersArray = null;
    let dim1 = 0, dim2 = 0, dim3 = 0, dim4 = 0, personality = '探索者';

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/answers?code=eq.${encodeURIComponent(code)}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        const data = await response.json();
        if (data && data.length > 0) {
            answersArray = data[0].answers_json;
            dim1 = data[0].dim1 || 0;
            dim2 = data[0].dim2 || 0;
            dim3 = data[0].dim3 || 0;
            dim4 = data[0].dim4 || 0;
            personality = data[0].personality || '探索者';
            console.log('✅ 从 Supabase 读取成功');
        }
    } catch(e) { console.error(e); }

    if (!answersArray || answersArray.length === 0) {
        try {
            var savedProgress = localStorage.getItem('partner-lab-progress');
            if (savedProgress) {
                answersArray = JSON.parse(savedProgress).answers;
            }
            var savedResult = localStorage.getItem('partner-lab-result');
            if (savedResult && !dim1) {
                var resultData = JSON.parse(savedResult);
                dim1 = resultData.dim1; dim2 = resultData.dim2; dim3 = resultData.dim3; dim4 = resultData.dim4;
            }
        } catch(e) {}
    }

    if (!answersArray || answersArray.length === 0) {
        document.getElementById('report').innerHTML = `
            <div class="card" style="text-align:center;">
                <h2>⚠️ 未找到答题数据</h2>
                <p>报告编号：${code}</p>
                <p>请重新测试，或联系小红书 @关系实验室</p>
                <button class="btn" onclick="window.location.href='partner-test.html'">重新测试</button>
            </div>
        `;
        return;
    }

    var maxScore = Math.max.apply(null, answersArray);
    var minScore = Math.min.apply(null, answersArray);
    var maxQuestions = [], minQuestions = [];
    for (var i = 0; i < answersArray.length; i++) {
        if (answersArray[i] === maxScore) maxQuestions.push(i + 1);
        if (answersArray[i] === minScore) minQuestions.push(i + 1);
    }

    var html = '';
    html += '<div class="tag" style="margin-bottom:8px;">' + personality + '</div>';
    html += '<div class="flex-between">';
    html += '<h1 style="margin:0;">📖 完整深度报告</h1>';
    html += '<button class="copy-btn" id="copyCodeBtn">📋 复制编号 ' + code + '</button>';
    html += '</div>';
    html += '<div class="subtitle">编号：' + code + ' · ' + new Date().toLocaleString() + '</div>';
    
    if (isPaid) {
        html += '<div class="card highlight-card" style="background:rgba(76,175,80,0.1); border-color:#4caf50;">';
        html += '<div class="card-title" style="color:#4caf50;">✅ 感谢支持 · 已解锁完整版</div></div>';
    }
    
    html += '<div class="card"><div class="card-title">📊 你的四维度得分</div><div class="card-text">';
    html += '<b>🔹 沉默解读：</b>' + dim1 + '/50<br>';
    html += '<b>🔹 需求表达：</b>' + dim2 + '/50<br>';
    html += '<b>🔹 爱意感知：</b>' + dim3 + '/50<br>';
    html += '<b>🔹 冲突修复：</b>' + dim4 + '/50';
    html += '</div></div>';
    
    html += '<div class="card highlight-card"><div class="card-title">🔍 最需要关注的题目</div><div class="card-text">';
    html += '<p>第 <b>' + maxQuestions.join('、') + '</b> 题得分 <b>' + maxScore + '/5</b></p></div></div>';
    
    html += '<div class="card highlight-card"><div class="card-title">💪 已经做得不错的方面</div><div class="card-text">';
    html += '<p>第 <b>' + minQuestions.join('、') + '</b> 题得分 <b>' + minScore + '/5</b></p></div></div>';
    
    html += '<div class="card"><div class="card-title">🧠 深度心理解读</div><div class="card-text">';
    html += '<p><b>📌 沉默解读</b>：' + (dim1 >= 38 ? '你对沉默比较敏感' : (dim1 <= 20 ? '你能理性看待沉默' : '你有时会多想')) + '</p>';
    html += '<p><b>📌 需求表达</b>：' + (dim2 >= 38 ? '表达常需翻译' : (dim2 <= 20 ? '能直接表达需求' : '多数能说清')) + '</p>';
    html += '<p><b>📌 爱意感知</b>：' + (dim3 >= 38 ? '接收方式较固定' : (dim3 <= 20 ? '接收器很灵活' : '有自己偏好')) + '</p>';
    html += '<p><b>📌 冲突修复</b>：' + (dim4 >= 38 ? '需要完整仪式' : (dim4 <= 20 ? '修复方式独立' : '能接受不同节奏')) + '</p>';
    html += '</div></div>';
    
    html += '<div class="card" style="text-align:center; border:2px solid rgba(224,90,138,0.6);">';
    html += '<div class="card-title" style="color:#e05a8a;">📝 查看每道题的逐题解读</div>';
    html += '<div class="code-input-group">';
    html += '<input type="text" id="inputReportCode" value="' + code + '">';
    html += '<button id="gotoViewReportBtn">📖 进入逐题解读 →</button>';
    html += '</div></div>';
    
    if (!isPaid) {
        html += '<div class="card" style="text-align:center; border:2px solid rgba(224,90,138,0.6);">';
        html += '<div class="card-title" style="color:#e05a8a;">📕 解锁完整逐题解读</div>';
        html += '<div class="xhs-card">';
        html += '<div style="font-size:28px;">📕</div>';
        html += '<div style="font-weight:600;">小红书 <span style="color:#e05a8a;">@关系实验室</span></div>';
        html += '<div style="font-size:13px;">小红书号：<b>9165138712</b></div>';
        html += '<div style="font-size:13px; background:rgba(0,0,0,0.3); padding:12px; border-radius:12px; margin-top:12px;">';
        html += '📝 私信发送：<br>1️⃣ 报告编号：<b>' + code + '</b><br>2️⃣ 你的画像标签<br><br>💰 支付 9.9 元后，24小时内发送完整报告';
        html += '</div>';
        html += '<button class="btn-copy" id="copyForXHSBtn">📋 复制报告编号，打开小红书</button>';
        html += '</div></div>';
    } else {
        html += '<div class="card highlight-card"><div class="card-title" style="color:#4caf50;">✅ 已解锁</div>';
        html += '<div class="card-text">请关注小红书 <b>@关系实验室</b>，私信报告编号获取完整版。<br>小红书号：<b>9165138712</b></div></div>';
    }
    
    html += '<div class="card" style="text-align:center;"><div class="card-text" style="font-size:12px;">⚠️ 本报告仅为个人反思工具<br>© 关系实验室 · 我兔了 & 你龙么</div></div>';
    
    document.getElementById('report').innerHTML = html;
    
    document.getElementById('copyCodeBtn')?.addEventListener('click', () => {
        navigator.clipboard.writeText(code);
        alert('✅ 报告编号已复制：' + code);
    });
    
    document.getElementById('gotoViewReportBtn')?.addEventListener('click', () => {
        var inputCode = document.getElementById('inputReportCode').value.trim().toUpperCase();
        if (!inputCode) { alert('请输入报告编号'); return; }
        window.location.href = 'view-report-partner.html?code=' + inputCode + (isPaid ? '&unlock=paid' : '');
    });
    
    document.getElementById('copyForXHSBtn')?.addEventListener('click', () => {
        navigator.clipboard.writeText(code);
        alert('✅ 报告编号已复制：' + code + '\n\n请打开小红书，私信发送给 @关系实验室\n\n小红书号：9165138712');
        window.open('https://www.xiaohongshu.com/user/profile/9165138712', '_blank');
    });
})();
</script>
</body>
</html>
