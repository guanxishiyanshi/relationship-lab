<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整深度报告 · 情感出厂设置</title>
    <style>
        body { margin:0; padding:16px; background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 100%); min-height:100vh; font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif; color:#fff; }
        .container { max-width:420px; margin:0 auto; padding-bottom:40px; }
        .card { background:rgba(255,255,255,0.05); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
        .card-title { font-size:18px; font-weight:700; margin-bottom:12px; color:#f0974a; }
        .card-text { font-size:15px; line-height:1.65; color:rgba(255,255,255,0.85); }
        .highlight-card { border:2px solid rgba(240,151,74,0.5); background:rgba(240,151,74,0.08); }
        .tag { display:inline-block; background:linear-gradient(135deg,#f0974a,#e05a2a); padding:8px 24px; border-radius:100px; font-size:14px; font-weight:600; margin-bottom:16px; }
        h1 { font-size:28px; margin-bottom:8px; }
        .subtitle { font-size:14px; color:rgba(255,255,255,0.5); margin-bottom:24px; }
        .btn { display:block; width:100%; padding:16px; border-radius:12px; border:none; font-size:18px; font-weight:600; cursor:pointer; text-align:center; margin-top:24px; background:linear-gradient(135deg,#ff6b35,#f0974a); color:#fff; }
        .btn-copy { background:rgba(240,151,74,0.2); border:1px solid #f0974a; border-radius:20px; padding:10px 16px; font-size:14px; color:#f0974a; cursor:pointer; margin-top:12px; width:100%; }
        .loading { text-align:center; padding:60px 0; font-size:18px; color:rgba(255,255,255,0.6); }
        .code-input-group { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
        .code-input-group input { flex:2; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:#fff; font-size:14px; outline:none; }
        .code-input-group button { flex:1; padding:12px; border-radius:12px; border:none; background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
        .copy-btn { background:rgba(240,151,74,0.2); border:1px solid #f0974a; border-radius:20px; padding:6px 14px; font-size:13px; color:#f0974a; cursor:pointer; display:inline-block; margin-left:12px; }
        .flex-between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
        .xhs-card { background:rgba(240,151,74,0.1); border-radius:16px; padding:16px; margin:16px 0; text-align:center; }
    </style>
</head>
<body>
<div class="container" id="report">
    <div class="loading">✨ 正在生成你的完整深度报告…</div>
</div>

<script>
const SUPABASE_URL = 'https://ptadbowmnbytfwoisrup.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VTrW3OmOe2al2vxfs85QGA_Tc_G3wDI';

(async function() {
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var isPaid = (params.get('unlock') === 'paid');

    if (!code) {
        document.getElementById('report').innerHTML = '<div class="card"><h2>🔒 未找到报告编号</h2><p>请从测试结果页进入。</p></div>';
        return;
    }

    // 从 Supabase 读取数据
    let answersArray = null;
    let dim1 = 0, dim2 = 0, dim3 = 0, personality = '探索者';
    let dbData = null;

    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/answers?code=eq.${encodeURIComponent(code)}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        const data = await response.json();
        if (data && data.length > 0) {
            dbData = data[0];
            answersArray = dbData.answers_json;
            dim1 = dbData.dim1 || 0;
            dim2 = dbData.dim2 || 0;
            dim3 = dbData.dim3 || 0;
            personality = dbData.personality || '探索者';
            console.log('✅ 从 Supabase 读取成功');
        } else {
            console.log('⚠️ Supabase 未找到数据');
        }
    } catch(e) { console.error('Supabase 读取失败', e); }

    // 如果 Supabase 没有数据，从 localStorage 读取
    if (!answersArray || answersArray.length === 0) {
        try {
            var savedProgress = localStorage.getItem('relationship-lab-progress');
            if (savedProgress) {
                var progressData = JSON.parse(savedProgress);
                answersArray = progressData.answers;
                console.log('✅ 从 localStorage 读取答案');
            }
            var savedResult = localStorage.getItem('relationship-lab-result');
            if (savedResult && !dim1) {
                var resultData = JSON.parse(savedResult);
                dim1 = resultData.dim1;
                dim2 = resultData.dim2;
                dim3 = resultData.dim3;
            }
        } catch(e) { console.error(e); }
    }

    // 如果没有数据，显示错误
    if (!answersArray || answersArray.length === 0) {
        document.getElementById('report').innerHTML = `
            <div class="card" style="text-align:center;">
                <h2>⚠️ 未找到答题数据</h2>
                <p>报告编号：${code}</p>
                <p>请重新测试，或联系小红书 @关系实验室</p>
                <button class="btn" onclick="window.location.href='test.html'">重新测试</button>
            </div>
        `;
        return;
    }

    // 计算画像（如果 Supabase 没有）
    if (personality === '探索者' && dim1 > 0) {
        var l1 = dim1 >= 28 ? '高' : (dim1 >= 17 ? '中' : '低');
        var l2 = dim2 >= 28 ? '高' : (dim2 >= 17 ? '中' : '低');
        var l3 = dim3 >= 28 ? '高' : (dim3 >= 17 ? '中' : '低');
        var map = {
            '高-高-高':'全面冻结型','高-高-中':'全面冻结型','高-中-高':'全面冻结型','中-高-高':'全面冻结型',
            '高-高-低':'孤独的付出者','高-中-低':'孤独的付出者','中-高-低':'孤独的付出者',
            '高-低-高':'孤独的阅读者','高-低-中':'孤独的阅读者','高-低-低':'孤独的阅读者',
            '低-高-高':'未启程的旅人','低-中-高':'未启程的旅人','低-高-低':'未启程的旅人',
            '中-低-高':'责任型守护者','低-低-高':'责任型守护者','中-低-低':'责任型守护者',
            '低-低-中':'双向通达型','低-低-低':'双向通达型','中-中-中':'矛盾探索者'
        };
        personality = map[l1+'-'+l2+'-'+l3] || '矛盾探索者';
    }

    // 分析最高/最低分题目
    var maxScore = Math.max.apply(null, answersArray);
    var minScore = Math.min.apply(null, answersArray);
    var maxQuestions = [];
    var minQuestions = [];
    for (var i = 0; i < answersArray.length; i++) {
        if (answersArray[i] === maxScore) maxQuestions.push(i + 1);
        if (answersArray[i] === minScore) minQuestions.push(i + 1);
    }

    // 构建 HTML
    var html = '';
    html += '<div class="tag" style="margin-bottom:8px;">' + personality + '</div>';
    html += '<div class="flex-between">';
    html += '<h1 style="margin:0;">📖 完整深度报告</h1>';
    html += '<button class="copy-btn" id="copyCodeBtn">📋 复制编号 ' + code + '</button>';
    html += '</div>';
    html += '<div class="subtitle">编号：' + code + ' · 报告生成时间：' + new Date().toLocaleString() + '</div>';
    
    if (isPaid) {
        html += '<div class="card highlight-card" style="background:rgba(76,175,80,0.1); border-color:#4caf50;">';
        html += '<div class="card-title" style="color:#4caf50;">✅ 感谢支持 · 已解锁完整版</div>';
        html += '<div class="card-text">你已经解锁全部深度解读。</div></div>';
    }
    
    html += '<div class="card"><div class="card-title">📊 你的三维度得分</div><div class="card-text">';
    html += '<b>🔹 自我情绪：</b>' + dim1 + '/40<br>';
    html += '<b>🔹 共情回应：</b>' + dim2 + '/35<br>';
    html += '<b>🔹 爱的动力：</b>' + dim3 + '/35';
    html += '</div></div>';
    
    html += '<div class="card highlight-card"><div class="card-title">🔍 最需要关注的题目</div><div class="card-text">';
    html += '<p>你在第 <b>' + maxQuestions.join('、') + '</b> 题上的得分是 <b>' + maxScore + '/5</b>，这些方面值得你优先关注。</p>';
    html += '</div></div>';
    
    html += '<div class="card highlight-card"><div class="card-title">💪 已经做得不错的方面</div><div class="card-text">';
    html += '<p>你在第 <b>' + minQuestions.join('、') + '</b> 题上的得分是 <b>' + minScore + '/5</b>，这些方面你表现良好。</p>';
    html += '</div></div>';
    
    // 深度心理解读
    html += '<div class="card"><div class="card-title">🧠 深度心理解读</div><div class="card-text">';
    html += '<p>你的测试结果揭示了你在亲密关系中 <b>"情感出厂设置"</b>。</p>';
    html += '<p><b>📌 自我情绪</b>：' + (dim1 >= 28 ? '你习惯用做事逃避情绪。' : (dim1 <= 17 ? '你能识别自己的情绪，这是宝贵的能力。' : '你有时能觉察情绪，有时会逃避。')) + '</p>';
    html += '<p><b>📌 共情回应</b>：' + (dim2 >= 28 ? '你擅长解决问题而非倾听。' : (dim2 <= 17 ? '你的共情能力不错，能分辨她需要什么。' : '你有时能倾听，有时会分析。')) + '</p>';
    html += '<p><b>📌 爱的动力</b>：' + (dim3 >= 28 ? '你的驱动力更多来自责任。' : (dim3 <= 17 ? '你的爱来自内心渴望。' : '你内心有渴望，也有责任。')) + '</p>';
    html += '</div></div>';
    
    // 逐题解读入口
    html += '<div class="card" style="text-align:center; border:2px solid rgba(240,151,74,0.6);">';
    html += '<div class="card-title" style="color:#f0974a;">📝 查看每道题的逐题解读</div>';
    html += '<div class="card-text" style="margin-bottom:12px;">想看每一道题你选了哪个答案、为什么、怎么调整？</div>';
    html += '<div class="code-input-group">';
    html += '<input type="text" id="inputReportCode" placeholder="报告编号" value="' + code + '">';
    html += '<button id="gotoViewReportBtn">📖 进入逐题解读 →</button>';
    html += '</div></div>';
    
    // 小红书引流（未付费用户）
    if (!isPaid) {
        html += '<div class="card" style="text-align:center; border:2px solid rgba(240,151,74,0.6);">';
        html += '<div class="card-title" style="color:#f0974a;">📕 解锁完整逐题解读</div>';
        html += '<div class="xhs-card">';
        html += '<div style="font-size:28px; margin-bottom:8px;">📕</div>';
        html += '<div style="font-weight:600; font-size:16px;">小红书 <span style="color:#f0974a;">@关系实验室</span></div>';
        html += '<div style="font-size:13px; color:rgba(255,255,255,0.6); margin:8px 0;">小红书号：<b>9165138712</b></div>';
        html += '<div style="font-size:13px; background:rgba(0,0,0,0.3); padding:12px; border-radius:12px; text-align:left;">';
        html += '📝 私信发送：<br>1️⃣ 报告编号：<b>' + code + '</b><br>2️⃣ 你的画像标签：<b>' + personality + '</b><br><br>💰 支付 9.9 元后，24小时内发送完整报告';
        html += '</div>';
        html += '<button class="btn-copy" id="copyForXHSBtn">📋 复制报告编号，打开小红书</button>';
        html += '</div>';
        html += '<p style="font-size:10px; color:rgba(255,255,255,0.3); margin-top:12px;">⚠️ 人工交付，24小时内回复</p>';
        html += '</div>';
    } else {
        html += '<div class="card highlight-card" style="background:rgba(76,175,80,0.05);">';
        html += '<div class="card-title" style="color:#4caf50;">✅ 已解锁 · 获取完整逐题解读</div>';
        html += '<div class="card-text">你已经完成支付！<br><br>请关注小红书 <b>@关系实验室</b>，私信你的报告编号，我会发送完整版逐题解读给你。<br><br>小红书号：<b>9165138712</b></div>';
        html += '</div>';
    }
    
    html += '<div class="card" style="text-align:center;"><div class="card-text" style="font-size:12px;">⚠️ 本报告仅为个人反思工具<br>© 关系实验室 · 我兔了 & 你龙么</div></div>';
    
    document.getElementById('report').innerHTML = html;
    
    // 绑定复制按钮
    document.getElementById('copyCodeBtn')?.addEventListener('click', () => {
        navigator.clipboard.writeText(code);
        alert('✅ 报告编号已复制：' + code);
    });
    
    // 绑定跳转按钮
    document.getElementById('gotoViewReportBtn')?.addEventListener('click', () => {
        var inputCode = document.getElementById('inputReportCode').value.trim().toUpperCase();
        if (!inputCode) { alert('请输入报告编号'); return; }
        var url = 'view-report.html?code=' + inputCode;
        if (isPaid) url += '&unlock=paid';
        window.location.href = url;
    });
    
    // 绑定小红书引流按钮
    document.getElementById('copyForXHSBtn')?.addEventListener('click', () => {
        var copyCode = code;
        navigator.clipboard.writeText(copyCode);
        alert('✅ 报告编号已复制：' + copyCode + '\n\n请打开小红书，私信发送给 @关系实验室\n\n小红书号：9165138712');
        window.open('https://www.xiaohongshu.com/user/profile/9165138712', '_blank');
    });
})();
</script>
</body>
</html>
