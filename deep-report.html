<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完整深度报告 · 情感出厂设置</title>
    <style>
        body { margin:0; padding:16px; background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 100%); min-height:100vh; font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif; color:#fff; }
        .container { max-width:420px; margin:0 auto; padding-bottom:40px; }
        .card { background:rgba(255,255,255,0.05); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
        .card-title { font-size:18px; font-weight:700; margin-bottom:12px; color:#f0974a; letter-spacing:-0.3px; }
        .card-text { font-size:15px; line-height:1.65; color:rgba(255,255,255,0.85); }
        .highlight-card { border:2px solid rgba(240,151,74,0.5); background:rgba(240,151,74,0.08); }
        .tag { display:inline-block; background:linear-gradient(135deg,#f0974a,#e05a2a); padding:8px 24px; border-radius:100px; font-size:14px; font-weight:600; margin-bottom:16px; }
        h1 { font-size:28px; margin-bottom:8px; }
        .subtitle { font-size:14px; color:rgba(255,255,255,0.5); margin-bottom:24px; }
        .btn { display:block; width:100%; padding:16px; border-radius:12px; border:none; font-size:18px; font-weight:600; cursor:pointer; text-align:center; margin-top:24px; background:linear-gradient(135deg,#ff6b35,#f0974a); color:#fff; }
        .loading { text-align:center; padding:60px 0; font-size:18px; color:rgba(255,255,255,0.6); }
        .insight-quote { font-style:italic; border-left:3px solid #f0974a; padding-left:16px; margin:16px 0; color:rgba(255,255,255,0.7); }
        .tip-badge { background:rgba(240,151,74,0.2); border-radius:20px; padding:4px 12px; font-size:12px; display:inline-block; margin-bottom:8px; }
        ul, ol { padding-left:20px; margin:8px 0; }
        li { margin:8px 0; line-height:1.5; }
        .code-input-group { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
        .code-input-group input { flex:2; padding:12px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:#fff; font-size:14px; outline:none; }
        .code-input-group input::placeholder { color:rgba(255,255,255,0.4); }
        .code-input-group button { flex:1; padding:12px; border-radius:12px; border:none; background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
        .copy-btn { background:rgba(240,151,74,0.2); border:1px solid #f0974a; border-radius:20px; padding:6px 14px; font-size:13px; color:#f0974a; cursor:pointer; transition:0.2s; display:inline-block; margin-left:12px; }
        .copy-btn:hover { background:rgba(240,151,74,0.4); }
        .flex-between { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    </style>
</head>
<body>
<div class="container" id="report">
    <div class="loading">✨ 正在生成你的完整深度报告…</div>
</div>

<script>
(function(){
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var isPaid = (params.get('unlock') === 'paid');

    if (!code) {
        document.getElementById('report').innerHTML = '<h1>🔒 未找到报告编号</h1><p>请从测试结果页扫码进入。</p>';
        return;
    }

    var SUPABASE_URL = 'https://ptadbowmnbytfwoisrup.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_VTrW3OmOe2al2vxfs85QGA_Tc_G3wDI';

    fetch(SUPABASE_URL + '/rest/v1/answers?code=eq.' + encodeURIComponent(code), {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!data || data.length === 0) {
            document.getElementById('report').innerHTML = '<h1>🔒 未找到报告</h1><p>编号可能已过期，请重新测试。<br><br>💡 提示：如果你刚刚支付完成，请等待24小时内邮件通知。</p>';
            return;
        }
        var d = data[0];
        var answers = d.answers_json || [];
        var personality = d.personality || '探索者';
        
        // 构建完整 HTML
        var html = '';
        html += '<div class="tag" style="margin-bottom:8px;">' + personality + '</div>';
        html += '<div class="flex-between">';
        html += '<h1 style="margin:0;">📖 完整深度报告</h1>';
        html += '<button class="copy-btn" id="copyCodeBtn">📋 复制编号 ' + code + '</button>';
        html += '</div>';
        html += '<div class="subtitle">编号：' + code + ' · 报告生成时间：' + new Date().toLocaleString() + '</div>';
        
        // ========== 解锁状态提示 ==========
        if (isPaid) {
            html += '<div class="card highlight-card" style="background:rgba(76,175,80,0.1); border-color:#4caf50;">';
            html += '<div class="card-title" style="color:#4caf50;">✅ 感谢支持 · 已解锁完整版</div>';
            html += '<div class="card-text">你已经解锁全部深度解读，以下内容为完整报告。</div>';
            html += '</div>';
        }
        
        // ========== 1. 得分总览 ==========
        html += '<div class="card"><div class="card-title">📊 你的三维度得分</div><div class="card-text">';
        html += '<b>🔹 维度一 · 自我情绪的识别与接纳：</b>' + d.dim1 + '/40<br>';
        html += '<b>🔹 维度二 · 共情与情感回应：</b>' + d.dim2 + '/35<br>';
        html += '<b>🔹 维度三 · 爱的动机与内在驱动力：</b>' + d.dim3 + '/35';
        html += '</div></div>';
        
        // ========== 2. 题目得分分析 ==========
        if (answers.length > 0) {
            var maxScore = Math.max.apply(null, answers);
            var minScore = Math.min.apply(null, answers);
            var maxQuestions = [];
            var minQuestions = [];
            for (var i = 0; i < answers.length; i++) {
                if (answers[i] === maxScore) maxQuestions.push(i + 1);
                if (answers[i] === minScore) minQuestions.push(i + 1);
            }
            html += '<div class="card highlight-card"><div class="card-title">🔍 最需要关注的题目（得分较高）</div><div class="card-text">';
            html += '<span class="tip-badge">⚠️ 压力信号</span>';
            html += '<p>你在第 <b>' + maxQuestions.join('、') + '</b> 题上的得分是 <b>' + maxScore + '/5</b>，这些题目指向你关系中<br><b>最常见的困扰模式</b>，也是你可以优先调整的地方。</p>';
            html += '</div></div>';
            
            html += '<div class="card highlight-card"><div class="card-title">💪 已经做得不错的方面（得分较低）</div><div class="card-text">';
            html += '<span class="tip-badge">✅ 优势资产</span>';
            html += '<p>你在第 <b>' + minQuestions.join('、') + '</b> 题上的得分是 <b>' + minScore + '/5</b>，这些题目中你表现出较强的适应力，说明你在这些方面<br><b>已经具备健康的情感能力</b>，可以继续巩固。</p>';
            html += '</div></div>';
        }
        
        // ========== 3. 深度心理解读 ==========
        html += '<div class="card"><div class="card-title">🧠 深度心理解读</div><div class="card-text">';
        html += '<p>你的测试结果揭示了你在亲密关系中 <b>“情感出厂设置”</b>。</p>';
        html += '<p><b>📌 自我情绪</b>：' + (d.dim1 >= 28 ? '你习惯用做事逃避情绪，很少停下来问自己怎么了。' : (d.dim1 <= 17 ? '你能识别自己的情绪，这是很多男性缺失的能力。' : '你有时能觉察情绪，有时还是会逃避。')) + '</p>';
        html += '<p><b>📌 共情回应</b>：' + (d.dim2 >= 28 ? '你擅长解决问题而非倾听，给的关心常常不是她想要的。' : (d.dim2 <= 17 ? '你的共情能力不错，能分辨她需要倾听还是建议。' : '你有时能倾听，有时不自觉地开始分析。')) + '</p>';
        html += '<p><b>📌 爱的动力</b>：' + (d.dim3 >= 28 ? '你的驱动力更多来自责任，而不是内心真实的渴望。' : (d.dim3 <= 17 ? '你的爱来自内心渴望，不是被推着走。' : '你内心有渴望，但也容易被责任淹没。')) + '</p>';
        html += '<div class="insight-quote">无论你的得分如何，这份报告的目的不是给你贴标签，而是帮你看见自己。你已经走得比大多数人远了。</div>';
        html += '</div></div>';
        
        // ========== 4. 专属行动建议 ==========
        html += '<div class="card"><div class="card-title">🚀 3 条可立刻行动的建议</div><div class="card-text">';
        html += '<ol><li><b>每天2分钟自我扫描</b>：睡前闭眼问自己“我现在是什么感觉？”不评判，只是看见。</li>';
        html += '<li><b>开启“她需要什么”的探针</b>：她情绪不好时先问“你想让我听，还是想一起想办法？”</li>';
        html += '<li><b>创造一次“无目的约会”</b>：不谈孩子、不谈钱，只是你们俩，找回连接的初心。</li></ol>';
        html += '</div></div>';
        
        // ========== 5. 逐题解读入口（输入编号跳转新页面）==========
        html += '<div class="card" style="text-align:center; border:2px solid rgba(240,151,74,0.6); background:rgba(240,151,74,0.08);">';
        html += '<div class="card-title" style="color:#f0974a;">📝 查看每道题的逐题解读</div>';
        html += '<div class="card-text" style="margin-bottom:12px;">';
        html += '想看每一道题<strong>你选了哪个答案、为什么、怎么调整</strong>？<br>';
        html += '输入你的报告编号，进入逐题解读页面。';
        html += '</div>';
        html += '<div class="code-input-group">';
        html += '<input type="text" id="inputReportCode" placeholder="例如: ' + code + '" value="' + code + '">';
        html += '<button id="gotoViewReportBtn">📖 进入逐题解读 →</button>';
        html += '</div>';
        html += '<p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:12px;">';
        html += '逐题解读页面会显示每道题的原文、你的答案和个性化分析。<br>';
        html += (isPaid ? '✅ 你已付费，进入后可直接查看全部22道题。' : '🔒 未付费用户只能看到前3题预览，付费后输入解锁码可查看全部。');
        html += '</p>';
        html += '</div>';
        
        // ========== 6. 付费状态处理 ==========
        if (!isPaid) {
            html += '<div class="card" style="text-align:center; border:2px solid rgba(240,151,74,0.6); background:rgba(240,151,74,0.08);">';
            html += '<div class="card-title" style="color:#f0974a;">🔓 解锁完整逐题解读</div>';
            html += '<div class="card-text" style="margin-bottom:12px;">当前显示摘要版。<br>完整版包含<b>22道题的详细分析</b> + 个性化行动指南（约3000字）。</div>';
            html += '<button class="btn" id="unlockBtn">9.9元 · 解锁完整报告 →</button>';
            html += '<p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:12px;">微信支付后发送邮件，24小时内发送完整版</p>';
            html += '</div>';
        } else {
            html += '<div class="card highlight-card" style="background:rgba(76,175,80,0.05);">';
            html += '<div class="card-title" style="color:#4caf50;">📬 获取完整逐题解读（Word版）</div>';
            html += '<div class="card-text">你已经完成了付费，完整的 <b>22道逐题详细分析</b> 会通过邮件发送给你。<br><br>';
            html += '<b>请发送邮件到：wotule_nilongme@163.com</b><br>';
            html += '邮件标题：【已付费+' + code + '】<br>';
            html += '邮件内容：你的微信昵称 + 报告编号 ' + code + '<br><br>';
            html += '我会在<b>24小时内</b>将完整版（Word/PDF）发送给你。<br><br>';
            html += '你的每一次付费，都是这个“关系实验室”能继续做下去的动力。谢谢你愿意为你们的连接花这笔钱。❤️';
            html += '</div></div>';
        }
        
        // 免责声明
        html += '<div class="card" style="text-align:center; background:rgba(255,255,255,0.02);">';
        html += '<div class="card-text" style="font-size:12px; color:rgba(255,255,255,0.4);">';
        html += '⚠️ 本报告仅为个人反思工具，不构成心理诊断。<br>';
        html += '如有严重的情绪困扰或关系危机，建议寻求专业心理咨询。<br><br>';
        html += '© 关系实验室 · 我兔了 & 你龙么';
        html += '</div></div>';
        
        document.getElementById('report').innerHTML = html;
        
        // ========== 绑定复制按钮 ==========
        var copyBtn = document.getElementById('copyCodeBtn');
        if (copyBtn) {
            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(code);
                alert('✅ 报告编号已复制：' + code + '\n\n可以分享给伴侣或朋友查看。');
            });
        }
        
        // ========== 绑定逐题解读跳转按钮 ==========
        var gotoBtn = document.getElementById('gotoViewReportBtn');
        if (gotoBtn) {
            gotoBtn.onclick = function() {
                var inputCode = document.getElementById('inputReportCode').value.trim().toUpperCase();
                if (!inputCode) {
                    alert('请输入报告编号');
                    return;
                }
                var url = 'view-report.html?code=' + inputCode;
                if (isPaid) {
                    url += '&unlock=paid';
                }
                window.location.href = url;
            };
        }
        
        // 绑定付费按钮
        if (!isPaid) {
            var unlockBtn = document.getElementById('unlockBtn');
            if (unlockBtn) {
                unlockBtn.onclick = function() {
                    alert('📧 请发邮件到：wotule_nilongme@163.com\n\n邮件标题：【解锁报告】' + code + '\n邮件内容：你的微信昵称 + 报告编号 ' + code + '\n\n我会回复你付款方式（微信收款码），支付后24小时内发送完整版逐题解读。\n\n感谢你的信任 ❤️');
                };
            }
        }
    })
    .catch(function(err) {
        console.error(err);
        document.getElementById('report').innerHTML = '<h1>⚠️ 加载失败</h1><p>请检查网络后重试。<br><br>或发邮件到 <b>wotule_nilongme@163.com</b><br>提供你的报告编号 <b>' + (code || '') + '</b>，我会手动发送给你。</p>';
    });
})();
</script>
</body>
</html>
