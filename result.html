<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的情感出厂设置</title>
    <style>
        body {
            margin: 0;
            padding: 16px;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
            min-height: 100vh;
            font-family: "PingFang SC", "Noto Sans SC", "Helvetica Neue", sans-serif;
            color: #ffffff;
            box-sizing: border-box;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding-bottom: 40px;
        }
        .tag {
            display: inline-block;
            background: linear-gradient(135deg, #f0974a, #e05a2a);
            padding: 8px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .main-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .main-subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .radar-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #radarChart {
            width: 100%;
            height: 320px;
        }
        .dim-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dim-card .dim-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .dim-card .dim-score {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }
        .dim-card .dim-desc {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.75);
        }
        .bottom-btns {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn.primary {
            background: linear-gradient(135deg, #f0974a, #e05a2a);
            color: #fff;
        }
        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tag" id="personalityTag">...</div>
        <div class="main-title" id="personalityTitle">...</div>
        <div class="main-subtitle" id="personalitySubtitle">...</div>
        
        <div class="radar-box">
            <div id="radarChart"></div>
        </div>
        
        <div class="dim-card">
            <div class="dim-name">维度一：自我情绪的识别与接纳</div>
            <div class="dim-score" id="dim1Score">...</div>
            <div class="dim-desc" id="dim1Desc">...</div>
        </div>
        <div class="dim-card">
            <div class="dim-name">维度二：共情与情感回应的模式</div>
            <div class="dim-score" id="dim2Score">...</div>
            <div class="dim-desc" id="dim2Desc">...</div>
        </div>
        <div class="dim-card">
            <div class="dim-name">维度三：爱的动机与内在驱动力</div>
            <div class="dim-score" id="dim3Score">...</div>
            <div class="dim-desc" id="dim3Desc">...</div>
        </div>

        <!-- 二维码区域 -->
        <div style="text-align:center; margin:24px 0 8px;">
            <div id="qrcode" style="display:inline-block;"></div>
            <p style="font-size:13px; color:rgba(255,255,255,0.5); margin-top:8px;">扫描二维码可查看完整结果</p>
        </div>
        
        <div class="bottom-btns">
            <button class="btn secondary" onclick="window.location.href='test.html'">重新测试</button>
            <button class="btn primary" id="shareBtn">保存我的结果</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        // ========== 数据解析 ==========
        function getScores() {
            const params = new URLSearchParams(window.location.search);
            const encoded = params.get('scores');
            if (encoded) {
                const decoded = atob(encoded);
                const scores = decoded.split(',').map(Number);
                return { dim1: scores[0], dim2: scores[1], dim3: scores[2] };
            }
            
            const saved = localStorage.getItem('relationship-lab-result');
            if (saved) {
                const data = JSON.parse(saved);
                return { dim1: data.dim1, dim2: data.dim2, dim3: data.dim3 };
            }
            
            return null;
        }

        function getLevel(score, type) {
            if (type === 1) {
                if (score >= 28) return '高';
                if (score >= 17) return '中';
                return '低';
            } else {
                if (score >= 28) return '高';
                if (score >= 17) return '中';
                return '低';
            }
        }

        function getPersonality(d1, d2, d3) {
            const key = d1 + '-' + d2 + '-' + d3;
            const map = {
                '高-高-高': '三盲型', '高-高-中': '三盲型', '高-中-高': '三盲型', '中-高-高': '三盲型',
                '高-高-低': '孤独的付出者', '高-中-低': '孤独的付出者', '中-高-低': '孤独的付出者',
                '高-低-高': '压抑的雷达', '高-低-中': '压抑的雷达', '高-低-低': '压抑的雷达',
                '低-高-高': '能力冻结型', '低-中-高': '能力冻结型', '低-高-低': '能力冻结型',
                '中-低-高': '工具化的暖男', '低-低-高': '工具化的暖男', '中-低-低': '工具化的暖男',
                '低-低-中': '双向通达型', '低-低-低': '双向通达型',
                '中-中-中': '沉默挣扎型', '中-中-高': '沉默挣扎型', '中-中-低': '沉默挣扎型',
                '中-高-中': '沉默挣扎型', '中-低-中': '沉默挣扎型',
                '高-中-中': '沉默挣扎型', '低-中-中': '沉默挣扎型'
            };
            return map[key] || '沉默挣扎型';
        }

        // ========== 文案配置 ==========
        const personalityTexts = {
            '三盲型': {
                subtitle: '你习惯了一个人扛下所有，却在情感世界里活成了一座孤岛。',
                dim1Desc: '情绪对你来说，是一种需要被“处理掉”的麻烦。你从小学会了用做事来逃避感受，用“没什么”来回应关心。这不是你的错，但你付出的代价，是弥散性的空虚。',
                dim2Desc: '你不是不在乎，是你的共情天线有些频道收不到信号。你习惯用“解决问题”来表达关心，但伴侣要的可能只是一句“我懂你”。你和你的伴侣，可能都在这段关系里感到孤独。',
                dim3Desc: '婚姻对你而言，更像是一个人生必答题。你清楚自己的责任，也一直在认真完成。但你有没有问过自己：除了完成任务，我在这段关系里，真的快乐吗？'
            },
            '孤独的付出者': {
                subtitle: '你用尽全力去爱，却苦于对方感受不到。你的爱，被困在了“翻译”里。',
                dim1Desc: '你不擅长识别自己的情绪，也不太会安抚自己。你习惯把内心的波动压下去，继续做该做的事。',
                dim2Desc: '面对伴侣的情绪，你常常手足无措。你给出的关心，常常包裹在分析和建议里，却忘了先接住她的感受。你很努力，但工具只有一把锤子。',
                dim3Desc: '你内心有强烈的爱的渴望，你想成为一个好丈夫、好父亲。这份渴望是你最宝贵的资产，它告诉你：你不是不想，只是还没学会。'
            },
            '压抑的雷达': {
                subtitle: '你能精准感知她的情绪，却把自己的心封锁起来。',
                dim1Desc: '你与自己的内心是断联的。你对自己的情绪要么视而不见，要么习惯性压抑。你扛得起所有外在的责任，却在情感世界里活成了一个对自己一无所知的人。',
                dim2Desc: '你其实能敏锐地察觉到她的情绪变化。这是你天赋的共情能力。但你可能用错了方式——你感知到她的不快后，第一反应是“解决问题”而不是“理解感受”。',
                dim3Desc: '对你来说，关系更像是一项需要完成的“任务”而非发自内心的渴望。你可能是别人眼中的好丈夫，但你内心的麻木，只有你自己知道。'
            },
            '能力冻结型': {
                subtitle: '你拥有爱与被爱的能力，却似乎找不到出发的理由。',
                dim1Desc: '你能较好地识别自己的情绪，也懂得如何与自己相处。这是很多人没有的宝贵能力。',
                dim2Desc: '你能感知她的情绪，也知道该怎么回应。你是那种“可以做得很好”的人，但可能因为某些原因，你还没有把这份能力完全用出来。',
                dim3Desc: '你似乎还站在关系的门外。不是因为做不到，而是因为还没想清楚“为什么要进去”。请对自己温柔一点，你不需要一个完美的理由才能开始去爱。'
            },
            '工具化的暖男': {
                subtitle: '你能把她照顾得很好，却忘了照顾自己。你的爱，像一份精确的KPI。',
                dim1Desc: '你能识别自己的情绪，也懂得如何回应伴侣。这些能力让你在关系中看起来游刃有余。',
                dim2Desc: '你是那个“别人家的男朋友/老公”，你能接住她的情绪，给出恰当的回应。但你可能偶尔会想：我做这些，到底是因为爱，还是因为“应该”？',
                dim3Desc: '你经营关系的能力很强，但驱动力更多来自“责任”而非“渴望”。试着问自己：当我剥掉所有“应该”之后，我想要什么？'
            },
            '双向通达型': {
                subtitle: '你既懂自己，也懂别人。这是情感世界里最健康的状态。',
                dim1Desc: '你保留了与自己内心的连接。你能识别情绪并与之相处，这是一份很宝贵的能力。',
                dim2Desc: '你能较好地识别并回应伴侣的情绪信号。你不只用“解决问题”来表达关心，也懂得倾听和共情。这是你送给你所爱之人最好的礼物。',
                dim3Desc: '你进入或期待一段关系，更多是出于自己内心的声音。你知道婚姻辛苦，但你相信自己有能力在其中创造一些值得的东西。'
            },
            '沉默挣扎型': {
                subtitle: '你不是不想，是不知道该怎么办。你正在努力的途中。',
                dim1Desc: '你偶尔能察觉到不对劲，但不知如何是好。你在情绪的门外徘徊，手里拿着钥匙，却忘了怎么用。',
                dim2Desc: '你开始意识到她的情绪是一个需要处理的东西，但你的工具很有限。你常常在“想帮忙”和“帮了倒忙”之间反复。',
                dim3Desc: '你内心还有渴望，但常常被现实和责任淹没。你偶尔会问“我想要什么”，但很快又告诉自己“别想那些没用的”。这份矛盾，本身就是一种清醒。'
            }
        };

        // ========== 渲染页面 ==========
        const scores = getScores();
        if (!scores) {
            document.querySelector('.container').innerHTML = `
                <h1>未找到测评数据</h1>
                <p>如果你之前做过测试，请用<strong>同一个浏览器</strong>打开本页面。</p>
                <p>如果还没做过：</p>
                <button class="btn primary" onclick="window.location.href='index.html'" 
style="padding:14px 32px; border-radius:12px; border:none; background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; font-size:16px; font-weight:600;">开始测试</button>
            `;
        } else {
            const d1Level = getLevel(scores.dim1, 1);
            const d2Level = getLevel(scores.dim2, 2);
            const d3Level = getLevel(scores.dim3, 3);
            const personality = getPersonality(d1Level, d2Level, d3Level);
            const text = personalityTexts[personality];

            document.getElementById('personalityTag').textContent = personality;
            document.getElementById('personalityTitle').textContent = '你是：' + personality;
            document.getElementById('personalitySubtitle').textContent = text.subtitle;

            document.getElementById('dim1Score').textContent = '得分 ' + scores.dim1 + '/40 · ' + (d1Level === '高' ? '情感隔离模式' : d1Level === '中' ? '沉默挣扎模式' : '自我觉察模式');
            document.getElementById('dim1Desc').textContent = text.dim1Desc;

            document.getElementById('dim2Score').textContent = '得分 ' + scores.dim2 + '/35 · ' + (d2Level === '高' ? '信号接收困难模式' : d2Level === '中' ? '努力但笨拙模式' : '共情能力在线模式');
            document.getElementById('dim2Desc').textContent = text.dim2Desc;

            document.getElementById('dim3Score').textContent = '得分 ' + scores.dim3 + '/35 · ' + (d3Level === '高' ? '任务驱动型' : d3Level === '中' ? '矛盾犹豫型' : '内在驱动型');
            document.getElementById('dim3Desc').textContent = text.dim3Desc;

            // 雷达图：统一比例尺到40
            const d1Scaled = scores.dim1;
            const d2Scaled = Math.round(scores.dim2 * (40 / 35));
            const d3Scaled = Math.round(scores.dim3 * (40 / 35));

            const chartDom = document.getElementById('radarChart');
            const myChart = echarts.init(chartDom);
            const option = {
                radar: {
                    center: ['50%', '50%'],
                    radius: '70%',
                    indicator: [
                        { name: '自我情绪', max: 40 },
                        { name: '共情回应', max: 40 },
                        { name: '爱的动力', max: 40 }
                    ],
                    axisName: { color: 'rgba(255,255,255,0.7)', fontSize: 13 },
                    splitArea: {
                        areaStyle: { color: ['rgba(240,151,74,0.05)', 'rgba(240,151,74,0.1)'] }
                    },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.15)' } },
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } }
                },
                series: [{
                    type: 'radar',
                    data: [{ value: [d1Scaled, d2Scaled, d3Scaled], name: '你' }],
                    areaStyle: { color: 'rgba(240,151,74,0.3)' },
                    lineStyle: { color: '#f0974a', width: 2 },
                    itemStyle: { color: '#f0974a' },
                    symbol: 'circle',
                    symbolSize: 6
                }]
            };
            myChart.setOption(option);
            window.addEventListener('resize', () => myChart.resize());

            // ========== 生成二维码 ==========
            const resultUrl = window.location.href;
            new QRCode(document.getElementById("qrcode"), {
                text: resultUrl,
                width: 100,
                height: 100,
                colorDark: "#f0974a",
                colorLight: "rgba(255,255,255,0.05)",
                correctLevel: QRCode.CorrectLevel.M
            });

            // ========== 保存结果 ==========
            document.getElementById('shareBtn').addEventListener('click', function() {
                const btn = this;
                btn.textContent = '正在生成...';
                btn.disabled = true;
                
                html2canvas(document.querySelector('.container'), {
                    backgroundColor: '#0a1628',
                    scale: 2,
                    useCORS: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = '我的情感出厂设置.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    btn.textContent = '保存我的结果';
                    btn.disabled = false;
                }).catch(() => {
                    btn.textContent = '生成失败，请重试';
                    btn.disabled = false;
                });
            });
        }
    </script>
</body>
</html>
