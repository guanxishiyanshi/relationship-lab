<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的情感出厂设置</title>
    <style>
        body { margin:0; padding:16px; background:linear-gradient(135deg,#0a1628 0%,#1a2a4a 100%); min-height:100vh; font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif; color:#fff; box-sizing:border-box; }
        .container { max-width:420px; margin:0 auto; padding-bottom:40px; }
        .tag { display:inline-block; background:linear-gradient(135deg,#f0974a,#e05a2a); padding:8px 24px; border-radius:100px; font-size:14px; font-weight:600; margin-bottom:16px; }
        .main-title { font-size:32px; font-weight:700; margin-bottom:8px; }
        .main-subtitle { font-size:16px; color:rgba(255,255,255,0.6); margin-bottom:32px; line-height:1.5; }
        .radar-box { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:20px; padding:16px; margin-bottom:24px; border:1px solid rgba(255,255,255,0.1); }
        #radarChart { width:100%; height:320px; }
        .card { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
        .card .card-title { font-size:16px; font-weight:600; margin-bottom:8px; }
        .card .card-text { font-size:14px; line-height:1.6; color:rgba(255,255,255,0.75); }
        .btn-row { display:flex; gap:12px; margin-top:32px; flex-wrap:wrap; }
        .btn { flex:1; min-width:120px; padding:14px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; text-align:center; }
        .btn-orange { background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; }
        .btn-pink { background:linear-gradient(135deg,#e05a8a,#c04a6a); color:#fff; }
        .btn-ghost { background:rgba(255,255,255,0.1); color:#fff; }
        .btn-lock { background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; font-size:18px; padding:18px; width:100%; border-radius:16px; box-shadow:0 8px 24px rgba(240,151,74,0.4); cursor:pointer; border:none; }
        .highlight { border:2px solid rgba(240,151,74,0.5); background:rgba(240,151,74,0.08); }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:#1a2a4a; border-radius:20px; padding:28px 24px; margin:16px; max-width:360px; text-align:center; border:1px solid rgba(255,255,255,0.1); }
        .modal-icon { font-size:40px; margin-bottom:12px; }
        .modal-title { font-size:20px; font-weight:700; margin-bottom:8px; }
        .modal-desc { font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:24px; line-height:1.6; }
        .modal-btns { display:flex; flex-direction:column; gap:10px; }
        .modal-btn { padding:14px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; }
    </style>
</head>
<body>

<!-- 免责声明 -->
<div style="text-align:center; padding:8px; font-size:11px; color:rgba(255,255,255,0.3); margin-bottom:8px;">
    ⚠️ 本测试仅为个人反思工具，不构成心理诊断，不可替代专业心理咨询或医疗服务。
</div>

<div class="container" id="report">

    <!-- 画像头部 -->
    <div class="tag" id="tag">...</div>
    <div class="main-title" id="title">...</div>
    <div class="main-subtitle" id="subtitle">...</div>

    <!-- 雷达图 -->
    <div class="radar-box"><div id="radarChart"></div></div>

    <!-- 三个维度 -->
    <div class="card"><div class="card-title" style="color:#f0974a;">维度一：自我情绪</div><div class="card-text" id="dim1Text"></div></div>
    <div class="card"><div class="card-title" style="color:#f0974a;">维度二：共情回应</div><div class="card-text" id="dim2Text"></div></div>
    <div class="card"><div class="card-title" style="color:#f0974a;">维度三：爱的动力</div><div class="card-text" id="dim3Text"></div></div>

    <!-- 综合结论 -->
    <div class="card highlight"><div class="card-title" style="color:#f0974a;">🔍 核心发现</div><div class="card-text" id="core"></div></div>

    <!-- 直击内心的一道题 -->
    <div id="deepCard"></div>

    <!-- 🔒 深度报告入口（带锁） -->
    <div class="card" style="text-align:center; border:2px solid rgba(240,151,74,0.6); background:rgba(240,151,74,0.08);">
        <div class="card-title" style="color:#f0974a; font-size:18px;">🔒 完整深度报告（逐题解读）</div>
        <div class="card-text" style="margin-bottom:12px;">
            包含 <b>22 道题逐题分析</b> + 专属关系建议
        </div>
        <button class="btn-lock" id="unlockDeepReportBtn">🔓 点击解锁深度报告 →</button>
        <p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:8px;">
            解锁方式：微信支付 9.9 元后，联系 wotule_nilongme@163.com 获取解锁码
        </p>
    </div>

    <!-- 创作者故事入口 -->
    <div class="card" style="text-align:center; cursor:pointer;" id="aboutCard">
        <div style="font-size:32px; margin-bottom:8px;">🐰🐲</div>
        <div class="card-title" style="color:#f0974a;">"我兔了"和"你龙么"是怎么来的？</div>
        <div class="card-text" style="color:rgba(255,255,255,0.5);">看看创作者的故事</div>
    </div>

    <!-- 底部按钮 -->
    <div class="btn-row">
        <button class="btn btn-ghost" onclick="window.location.href='test.html'">重新测试</button>
        <button class="btn btn-orange" id="saveBtn">保存结果</button>
        <button class="btn btn-pink" id="shareBtn">分享给她 →</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
(function(){
// ========== 全局变量 ==========
var params = new URLSearchParams(window.location.search);
var encoded = params.get('scores');
var scores = {dim1:0, dim2:0, dim3:0};
var personality = '';
var currentReportCode = null;

// ========== 数据读取 ==========
if (!encoded) { 
    try { 
        var s = localStorage.getItem('relationship-lab-result'); 
        if(s) {
            var parsed = JSON.parse(s);
            encoded = btoa(parsed.dim1 + ',' + parsed.dim2 + ',' + parsed.dim3);
        }
    } catch(e){ console.log(e); } 
}
if (!encoded) { 
    document.getElementById('report').innerHTML='<h1>未找到数据</h1><p>请从首页开始测试。</p><button class="btn btn-orange" onclick="window.location.href=\'index.html\'">开始测试</button>'; 
    return; 
}
var sArr = atob(encoded).split(',').map(Number);
scores = {dim1:sArr[0], dim2:sArr[1], dim3:sArr[2]};

// ========== 画像判断 ==========
function level(v,t){ 
    var h = (t===1 ? 28 : 28);
    var m = (t===1 ? 17 : 17); 
    if(v>=h) return '高'; 
    if(v>=m) return '中'; 
    return '低'; 
}
var l1 = level(scores.dim1,1);
var l2 = level(scores.dim2,2);
var l3 = level(scores.dim3,2);
var map = {
    '高-高-高':'全面冻结型','高-高-中':'全面冻结型','高-中-高':'全面冻结型','中-高-高':'全面冻结型',
    '高-高-低':'孤独的付出者','高-中-低':'孤独的付出者','中-高-低':'孤独的付出者',
    '高-低-高':'孤独的阅读者','高-低-中':'孤独的阅读者','高-低-低':'孤独的阅读者',
    '低-高-高':'未启程的旅人','低-中-高':'未启程的旅人','低-高-低':'未启程的旅人',
    '中-低-高':'责任型守护者','低-低-高':'责任型守护者','中-低-低':'责任型守护者',
    '低-低-中':'双向通达型','低-低-低':'双向通达型',
    '中-中-中':'矛盾探索者','中-中-高':'矛盾探索者','中-中-低':'矛盾探索者','中-高-中':'矛盾探索者','中-低-中':'矛盾探索者','高-中-中':'矛盾探索者','低-中-中':'矛盾探索者'
};
personality = map[l1+'-'+l2+'-'+l3] || '矛盾探索者';

// ========== 文案 ==========
var texts = {
    '全面冻结型':{sub:'你习惯了一个人扛下所有，却在情感世界里活成了一座孤岛。',d1:'得分 '+scores.dim1+'/40 · 情感隔离',d1d:'情绪对你来说是需要被处理掉的麻烦。你从小学会了用做事来逃避感受。',d2:'得分 '+scores.dim2+'/35 · 信号接收困难',d2d:'你习惯用"解决问题"来表达关心，但伴侣要的只是一句"我懂你"。',d3:'得分 '+scores.dim3+'/35 · 任务驱动',d3d:'婚姻对你更像人生必答题。你清楚责任，但真的快乐吗？'},
    '孤独的付出者':{sub:'你用尽全力去爱，却苦于对方感受不到。',d1:'得分 '+scores.dim1+'/40 · 情感隔离',d1d:'你不擅长识别自己的情绪，也不太会安抚自己。',d2:'得分 '+scores.dim2+'/35 · 信号接收困难',d2d:'你给出的关心常常包裹在分析和建议里。',d3:'得分 '+scores.dim3+'/35 · 内在驱动',d3d:'你内心有强烈的爱的渴望，你想成为一个好丈夫、好父亲。'},
    '孤独的阅读者':{sub:'你能精准感知她的情绪，却把自己的心封锁起来。',d1:'得分 '+scores.dim1+'/40 · 情感隔离',d1d:'你与自己的内心断联，习惯性压抑情绪。',d2:'得分 '+scores.dim2+'/35 · 共情能力在线',d2d:'你能敏锐察觉她的情绪，这是你的天赋。',d3:'得分 '+scores.dim3+'/35 · 任务驱动',d3d:'关系对你更像一项需要完成的"任务"。'},
    '未启程的旅人':{sub:'你拥有爱与被爱的能力，却找不到出发的理由。',d1:'得分 '+scores.dim1+'/40 · 自我觉察',d1d:'你能识别自己的情绪，懂得与自己相处。',d2:'得分 '+scores.dim2+'/35 · 共情能力在线',d2d:'你能感知她的情绪，也知道怎么回应。',d3:'得分 '+scores.dim3+'/35 · 任务驱动',d3d:'你似乎还站在关系的门外。'},
    '责任型守护者':{sub:'你能把她照顾得很好，却忘了照顾自己。',d1:'得分 '+scores.dim1+'/40 · 自我觉察',d1d:'你能识别情绪，懂得回应伴侣。',d2:'得分 '+scores.dim2+'/35 · 共情能力在线',d2d:'你能接住她的情绪。但偶尔会想：这是爱还是"应该"？',d3:'得分 '+scores.dim3+'/35 · 内在驱动',d3d:'你的驱动力更多来自"责任"而非"渴望"。'},
    '双向通达型':{sub:'你既懂自己，也懂别人。这是最健康的状态。',d1:'得分 '+scores.dim1+'/40 · 自我觉察',d1d:'你保留了与自己内心的连接。',d2:'得分 '+scores.dim2+'/35 · 共情能力在线',d2d:'你能识别并回应伴侣的情绪信号。',d3:'得分 '+scores.dim3+'/35 · 内在驱动',d3d:'你的心是自己点燃的，不是别人推着走的。'},
    '矛盾探索者':{sub:'你不是不想，是不知道该怎么办。你正在努力的途中。',d1:'得分 '+scores.dim1+'/40 · 沉默挣扎',d1d:'你偶尔能察觉到不对劲，但不知如何是好。',d2:'得分 '+scores.dim2+'/35 · 努力但笨拙',d2d:'你开始意识到她的情绪需要被处理，但工具有限。',d3:'得分 '+scores.dim3+'/35 · 矛盾犹豫',d3d:'你内心有渴望，但常被现实和责任淹没。'}
};
var t = texts[personality] || texts['矛盾探索者'];

// ========== 渲染页面 ==========
document.getElementById('tag').textContent = personality;
document.getElementById('title').textContent = '你是：'+personality;
document.getElementById('subtitle').textContent = t.sub;
document.getElementById('dim1Text').innerHTML = '<b>'+t.d1+'</b><br>'+t.d1d;
document.getElementById('dim2Text').innerHTML = '<b>'+t.d2+'</b><br>'+t.d2d;
document.getElementById('dim3Text').innerHTML = '<b>'+t.d3+'</b><br>'+t.d3d;

// 核心发现
var maxDim = Math.max(scores.dim1/40, scores.dim2/35, scores.dim3/35);
var minDim = Math.min(scores.dim1/40, scores.dim2/35, scores.dim3/35);
var coreText = '';
if(scores.dim2/35===maxDim && l2==='高') coreText = '你最大的困局在"共情回应"。你很努力，但关心常被误译。';
else if(scores.dim1/40===maxDim && l1==='高') coreText = '你最大的困局在"自我情绪"。你习惯了压抑，那些感受并没有消失。';
else if(scores.dim3/35===maxDim && l3==='高') coreText = '你最大的困局在"爱的动力"。你能扛起责任，但找不到自己的渴望。';
else coreText = '你的困局不太极端，但这恰恰是最难描述的状态——什么都有一点，什么都不确定。';
if(scores.dim2/35===minDim && l2==='低') coreText += '<br><br>但你的共情能力不错，这是很宝贵的资产。';
else if(scores.dim1/40===minDim && l1==='低') coreText += '<br><br>但你对自己情绪的觉察还不错，这是很多人缺失的能力。';
else if(scores.dim3/35===minDim && l3==='低') coreText += '<br><br>但你的爱的动力来自内心，这很难得。';
else coreText += '<br><br>你已经意识到了问题，愿意面对自己——这就是最大的优势。';
document.getElementById('core').innerHTML = coreText;

// ========== 雷达图 ==========
var chart = echarts.init(document.getElementById('radarChart'));
chart.setOption({
    radar:{center:['50%','50%'],radius:'70%',indicator:[{name:'自我情绪',max:40},{name:'共情回应',max:40},{name:'爱的动力',max:40}],axisName:{color:'rgba(255,255,255,0.7)',fontSize:13},splitArea:{areaStyle:{color:['rgba(240,151,74,0.05)','rgba(240,151,74,0.1)']}},splitLine:{lineStyle:{color:'rgba(255,255,255,0.15)'}},axisLine:{lineStyle:{color:'rgba(255,255,255,0.2)'}}},
    series:[{type:'radar',data:[{value:[scores.dim1,Math.round(scores.dim2*(40/35)),Math.round(scores.dim3*(40/35))],name:'你'}],areaStyle:{color:'rgba(240,151,74,0.3)'},lineStyle:{color:'#f0974a',width:2},itemStyle:{color:'#f0974a'},symbol:'circle',symbolSize:6}]
});
window.addEventListener('resize', function(){ chart.resize(); });

// ========== 直击内心的一道题 ==========
(function(){
    try {
        var ua = JSON.parse(localStorage.getItem('relationship-lab-progress')).answers;
        var qs = [
            {idx:4,t:'🧠 吵完架，你多久才懂自己怎么了',h:'你的感觉总是迟到。吵完架的当下你心里堵着，但说不清堵的是什么。等你想明白的时候，她已经等累了。这就是你们之间的时差。',m:'你偶尔能感觉到自己的情绪，偶尔不能。像一台时好时坏的收音机，收到的信号断断续续。',l:'你在冲突中对自己情绪的读取速度还不错。这份能力让你不至于总是缺席自己的感受。'},
            {idx:6,t:'💬 你对自己说话的方式',h:'你对别人温柔，对自己刻薄。犯错时对自己说"你怎么又搞砸了"，这些话你绝不会对朋友说，但对自己，你能说一整天。',m:'你偶尔能意识到自己对自己太狠了，但压力一来，那个苛责的声音又会回来。',l:'你对自己有基本的善意。内心那个声音说的是"没事，下次注意"。'},
            {idx:7,t:'🔇 被她质问时，你说得出来吗',h:'"你到底在想什么？"——这句话像一盆冷水。脑子瞬间空了。不是没有想法，是它们全部堵在门口，谁也出不去。',m:'平静的时候你能说，一旦变成质问，你的通道就收窄了。你不是不想说，是不知道怎么在这个温度下说。',l:'在压力下你还能保持表达。你知道怎么在风暴里保持连接。'},
            {idx:10,t:'🔧 你在帮她修问题，还是陪她坐着',h:'你表达关心的方式是抄起工具箱。她一说烦，你就开始分析、给方案。你觉得自己在处理问题，但她只是想要你坐着陪她一会儿。你一直在修一扇她没让你修的门。',m:'你有时候能倾听，有时候不自觉地开始解决问题。新旧模式还在交替。',l:'你不太会把"给建议"等同于"处理完了"。你知道什么时候该出手，什么时候只是陪着。'},
            {idx:20,t:'❤️ 你爱一个人，是真心还是怕孤单',h:'夜深人静时，一个人老去的画面会让你心慌。你想要一段感情，部分是因为害怕孤独。这不丢人。但怕孤独不能当感情的地基。',m:'你内心有两个声音：一个怕老了没人陪，一个说还是要找真心喜欢的。你已经看到了——你不只是被恐惧推着走。',l:'你想要一段关系，更多是因为你想爱，不是因为怕孤独。这份动力是纯粹的。'}
        ];
        qs.sort(function(a,b){ return ua[b.idx] - ua[a.idx]; });
        var top = qs[0];
        var sc = ua[top.idx];
        var ans = sc>=4 ? top.h : (sc>=2 ? top.m : top.l);
        var html = '<div class="card highlight"><div class="card-title" style="color:#f0974a;font-size:18px;">🎯 直击你内心的一道题</div>';
        html += '<div class="card-text" style="font-size:15px;line-height:1.7;"><b>'+top.t+'</b><br><br>'+ans;
        if(sc>=4) html += '<br><br><b style="color:#f0974a;">为什么会这样？怎么改？答案在完整报告里。</b>';
        html += '</div></div>';
        document.getElementById('deepCard').innerHTML = html;
    } catch(e) { 
        document.getElementById('deepCard').innerHTML = ''; 
    }
})();

// ========== 生成报告编号 ==========
try {
    var savedResult = localStorage.getItem('relationship-lab-result');
    if (savedResult) {
        var storedCode = localStorage.getItem('relationship-lab-report-code');
        if (storedCode) {
            currentReportCode = JSON.parse(storedCode).code;
        } else {
            currentReportCode = 'REL-' + Math.random().toString(36).substring(2, 6).toUpperCase();
            localStorage.setItem('relationship-lab-report-code', JSON.stringify({code: currentReportCode, timestamp: Date.now()}));
        }
    }
} catch(e) { console.log(e); }

// ========== 解锁深度报告（关键修复：确保按钮能点击）==========
// 使用 window.onload 或延迟绑定确保 DOM 已加载
window.addEventListener('DOMContentLoaded', function() {
    var unlockBtn = document.getElementById('unlockDeepReportBtn');
    if (unlockBtn) {
        unlockBtn.onclick = function() {
            // 🔑 预设解锁码（付费后告诉用户这个数字）
            var UNLOCK_CODE = '2025';  // ⚠️ 你可以改成任意数字/字符串
            
            var inputCode = prompt('🔒 请输入解锁码（付费后获得）\n\n解锁码获取方式：微信支付 9.9 元后，联系 wotule_nilongme@163.com 获取');
            
            if (inputCode === UNLOCK_CODE) {
                // 获取或生成报告编号
                var reportCode = currentReportCode;
                if (!reportCode) {
                    reportCode = 'REL-' + Math.random().toString(36).substring(2, 6).toUpperCase();
                    try {
                        localStorage.setItem('relationship-lab-report-code', JSON.stringify({code: reportCode, timestamp: Date.now()}));
                    } catch(e) {}
                }
                // 跳转到深度报告页面
                window.location.href = 'deep-report.html?code=' + reportCode + '&unlock=paid';
            } else if (inputCode !== null && inputCode !== '') {
                alert('❌ 解锁码错误\n\n请确认后重新输入，或联系 wotule_nilongme@163.com 获取正确解锁码');
            }
        };
    } else {
        console.log('未找到 unlockDeepReportBtn 按钮');
    }
});

// ========== 保存数据到 Supabase ==========
var SUPABASE_URL = 'https://ptadbowmnbytfwoisrup.supabase.co';
var SUPABASE_KEY = 'sb_publishable_VTrW3OmOe2al2vxfs85QGA_Tc_G3wDI';
var reportCodeForSave = currentReportCode || ('REL-' + Math.random().toString(36).substring(2, 6).toUpperCase());

(function saveToSupabase(){
    try {
        var savedProgress = localStorage.getItem('relationship-lab-progress');
        var answersArray = savedProgress ? JSON.parse(savedProgress).answers : [];
        fetch(SUPABASE_URL + '/rest/v1/answers', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
                code: reportCodeForSave,
                personality: personality,
                dim1: scores.dim1,
                dim2: scores.dim2,
                dim3: scores.dim3,
                dim4: 0,
                answers_json: answersArray
            })
        }).catch(function(e){ console.log('保存失败', e); });
        
        if (!localStorage.getItem('relationship-lab-report-code')) {
            localStorage.setItem('relationship-lab-report-code', JSON.stringify({code: reportCodeForSave, timestamp: Date.now()}));
            currentReportCode = reportCodeForSave;
        }
    } catch(e) { console.log(e); }
})();

// ========== 保存结果图片 ==========
document.getElementById('saveBtn').onclick = function(){
    var btn = this;
    btn.textContent = '生成中...';
    btn.disabled = true;
    html2canvas(document.getElementById('report'), {backgroundColor:'#0a1628', scale:2, useCORS:true}).then(function(c){
        var a = document.createElement('a');
        a.download = '情感出厂设置.png';
        a.href = c.toDataURL('image/png');
        a.click();
        btn.textContent = '保存结果';
        btn.disabled = false;
    }).catch(function(){
        btn.textContent = '失败，重试';
        btn.disabled = false;
    });
};

var shareUrl = 'https://guanxishiyanshi.github.io/relationship-lab/partner-test.html?partner=' + shareEncoded;

document.getElementById('shareBtn').onclick = function(){
    navigator.clipboard.writeText(shareUrl).then(function(){

        setTimeout(function(){ btn.textContent = '分享给她 →'; }, 2000);

        prompt('复制这个链接发给她：', shareUrl);
    });
};
