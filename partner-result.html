<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的爱的接收模式</title>
    <style>
        body { margin:0; padding:16px; background:linear-gradient(135deg,#1a0a28 0%,#2a1a4a 100%); min-height:100vh; font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif; color:#fff; box-sizing:border-box; }
        .container { max-width:420px; margin:0 auto; padding-bottom:40px; }
        .tag { display:inline-block; background:linear-gradient(135deg,#e05a8a,#c04a6a); padding:8px 24px; border-radius:100px; font-size:14px; font-weight:600; margin-bottom:16px; }
        .main-title { font-size:32px; font-weight:700; margin-bottom:8px; }
        .main-subtitle { font-size:16px; color:rgba(255,255,255,0.6); margin-bottom:32px; line-height:1.5; }
        .radar-box { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:20px; padding:16px; margin-bottom:24px; border:1px solid rgba(255,255,255,0.1); }
        #radarChart { width:100%; height:340px; }
        .card { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
        .card .card-title { font-size:16px; font-weight:600; margin-bottom:8px; }
        .card .card-text { font-size:14px; line-height:1.6; color:rgba(255,255,255,0.75); }
        .btn-row { display:flex; gap:12px; margin-top:32px; flex-wrap:wrap; }
        .btn { flex:1; min-width:120px; padding:14px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; text-align:center; }
        .btn-pink { background:linear-gradient(135deg,#e05a8a,#c04a6a); color:#fff; }
        .btn-orange { background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; }
        .btn-ghost { background:rgba(255,255,255,0.1); color:#fff; }
        .btn-lock { background:linear-gradient(135deg,#e05a8a,#c04a6a); color:#fff; font-size:18px; padding:18px; width:100%; border-radius:16px; box-shadow:0 8px 24px rgba(224,90,138,0.4); cursor:pointer; border:none; }
        .highlight { border:2px solid rgba(224,90,138,0.5); background:rgba(224,90,138,0.08); }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:#2a1a4a; border-radius:20px; padding:28px 24px; margin:16px; max-width:360px; text-align:center; border:1px solid rgba(255,255,255,0.1); }
        .modal-icon { font-size:40px; margin-bottom:12px; }
        .modal-title { font-size:20px; font-weight:700; margin-bottom:8px; }
        .modal-desc { font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:24px; line-height:1.6; }
        .modal-btns { display:flex; flex-direction:column; gap:10px; }
        .modal-btn { padding:14px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; }
    </style>
</head>
<body>

<!-- 免责声明 -->
<div style="text-align:center; padding:8px; font-size:11px; color:rgba(255,255,255,0.3); margin-bottom:8px;">
    ⚠️ 本测试仅为个人反思工具，不构成心理诊断，不可替代专业心理咨询或医疗服务。
</div>

<div class="container" id="report">

    <div class="tag" id="tag">...</div>
    <div class="main-title" id="title">...</div>
    <div class="main-subtitle" id="subtitle">...</div>

    <div class="radar-box"><div id="radarChart"></div></div>

    <div class="card"><div class="card-title" style="color:#e05a8a;">维度一：对他沉默的解读</div><div class="card-text" id="dim1Text"></div></div>
    <div class="card"><div class="card-title" style="color:#e05a8a;">维度二：表达需求的清晰度</div><div class="card-text" id="dim2Text"></div></div>
    <div class="card"><div class="card-title" style="color:#e05a8a;">维度三：对"被爱"的感知</div><div class="card-text" id="dim3Text"></div></div>
    <div class="card"><div class="card-title" style="color:#e05a8a;">维度四：冲突后的修复</div><div class="card-text" id="dim4Text"></div></div>

    <div class="card highlight"><div class="card-title" style="color:#e05a8a;">🔍 核心发现</div><div class="card-text" id="core"></div></div>

    <div id="deepCard"></div>

    <!-- 🔒 深度报告入口 -->
    <div class="card" style="text-align:center; border:2px solid rgba(224,90,138,0.6); background:rgba(224,90,138,0.08);">
        <div class="card-title" style="color:#e05a8a; font-size:18px;">🔒 完整深度报告（逐题解读）</div>
        <div class="card-text" style="margin-bottom:12px;">
            包含 <b>40 道题逐题分析</b> + 专属关系建议
        </div>
        <button class="btn-lock" id="unlockDeepReportBtn">🔓 点击解锁深度报告 →</button>
        <p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:8px;">
            解锁方式：微信支付 9.9 元后，联系 wotule_nilongme@163.com 获取解锁码
        </p>
    </div>

    <div class="card" style="text-align:center; cursor:pointer;" id="aboutCard">
        <div style="font-size:32px; margin-bottom:8px;">🐰🐲</div>
        <div class="card-title" style="color:#e05a8a;">"我兔了"和"你龙么"是怎么来的？</div>
        <div class="card-text" style="color:rgba(255,255,255,0.5);">看看创作者的故事</div>
    </div>

    <div class="btn-row">
        <button class="btn btn-ghost" onclick="window.location.href='partner-test.html'">重新测试</button>
        <button class="btn btn-pink" id="saveBtn">保存结果</button>
        <button class="btn btn-orange" id="shareBtn">分享给他 →</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
(function(){
// ========== 全局变量 ==========
var params = new URLSearchParams(window.location.search);
var encoded = params.get('scores');
var scores = {dim1:0, dim2:0, dim3:0, dim4:0};
var personality = '';
var currentReportCode = null;

// ========== 数据读取 ==========
if (!encoded) { 
    try { 
        var s = localStorage.getItem('partner-lab-result'); 
        if(s) {
            var parsed = JSON.parse(s);
            encoded = btoa(parsed.dim1 + ',' + parsed.dim2 + ',' + parsed.dim3 + ',' + parsed.dim4);
        }
    } catch(e){ console.log(e); } 
}
if (!encoded) { 
    document.getElementById('report').innerHTML='<h1>未找到数据</h1><p>请从首页开始测试。</p><button class="btn btn-pink" onclick="window.location.href=\'index.html\'">开始测试</button>'; 
    return; 
}
var sArr = atob(encoded).split(',').map(Number);
scores = {dim1:sArr[0], dim2:sArr[1], dim3:sArr[2], dim4:sArr[3]};

// ========== 画像判断 ==========
function level(v){ if(v>=38) return '高'; if(v>=25) return '中'; return '低'; }
var l1=level(scores.dim1), l2=level(scores.dim2), l3=level(scores.dim3), l4=level(scores.dim4);
var r1=scores.dim1/50, r2=scores.dim2/50, r3=scores.dim3/50, r4=scores.dim4/50;

var personalityMap = {
    '高-高-高-高': '疲惫的双面镜', '高-高-高-中': '疲惫的双面镜', '高-高-中-高': '疲惫的双面镜',
    '高-高-低-高': '等待的信号灯', '高-中-高-高': '等待的信号灯', '中-高-高-高': '等待的信号灯',
    '高-低-高-高': '焦虑的独行者', '高-低-高-中': '焦虑的独行者', '高-高-低-低': '感知失调者',
    '低-高-高-高': '冷静的船锚', '低-低-低-低': '冷静的船锚', '中-中-中-中': '矛盾探索者'
};
var key = l1+'-'+l2+'-'+l3+'-'+l4;
personality = personalityMap[key] || '探索者';

// ========== 文案 ==========
var texts = {
    '疲惫的双面镜': {sub:'你总是替他说了所有他没说的话。', d1:'得分 '+scores.dim1+'/50 · 过度解读沉默', d1d:'你总在猜测他为什么沉默，替他想好了理由。', d2:'得分 '+scores.dim2+'/50 · 替他表达', d2d:'你把两个人的沟通工作都扛在了自己肩上。', d3:'得分 '+scores.dim3+'/50 · 感知过载', d3d:'你能识别很多爱的信号，但因此也更累。', d4:'得分 '+scores.dim4+'/50 · 总是先修复', d4d:'冲突后你总是先低头的那个人。'},
    '等待的信号灯': {sub:'你需要明确的承诺才能感到安心。', d1:'得分 '+scores.dim1+'/50 · 对犹豫敏感', d1d:'他的不确定让你特别警觉。', d2:'得分 '+scores.dim2+'/50 · 试探性表达', d2d:'你不敢一上来就摊牌，怕被拒绝。', d3:'得分 '+scores.dim3+'/50 · 需要承诺', d3d:'你需要他明确说出“我在”。', d4:'得分 '+scores.dim4+'/50 · 需要完整修复', d4d:'你需要认真道歉才能翻篇。'},
    '焦虑的独行者': {sub:'你一个人什么都可以，但希望有人让你不用这样。', d1:'得分 '+scores.dim1+'/50 · 不期待了', d1d:'你学会了不期待，因为失望太痛。', d2:'得分 '+scores.dim2+'/50 · 最难开口', d2d:'“我需要你”是你最难说出口的话。', d3:'得分 '+scores.dim3+'/50 · 渴望但不敢承认', d3d:'你其实很想被照顾。', d4:'得分 '+scores.dim4+'/50 · 自己消化', d4d:'你修复的方式是“算了，我自己想通”。'},
    '感知失调者': {sub:'你知道他爱你，但你感受不到。', d1:'得分 '+scores.dim1+'/50 · 对沉默冷静', d1d:'他的沉默不太会困扰你。', d2:'得分 '+scores.dim2+'/50 · 表达偏向抱怨', d2d:'你说出来的常是情绪，不是需求。', d3:'得分 '+scores.dim3+'/50 · 只认特定频道', d3d:'只有特定形式的爱你才接收得到。', d4:'得分 '+scores.dim4+'/50 · 需要仪式', d4d:'你需要他做点什么才能确定和好。'},
    '冷静的船锚': {sub:'你能接住情绪，也等得起修复。', d1:'得分 '+scores.dim1+'/50 · 理解沉默', d1d:'你能分辨他沉默的类型。', d2:'得分 '+scores.dim2+'/50 · 直接表达', d2d:'你能温和地说清自己的需求。', d3:'得分 '+scores.dim3+'/50 · 多通道接收', d3d:'你能从多种行为中感知爱。', d4:'得分 '+scores.dim4+'/50 · 节奏灵活', d4d:'你能等，也懂得适时主动。'},
    '矛盾探索者': {sub:'你不是不想，是不知道该怎么办。', d1:'得分 '+scores.dim1+'/50 · 时而敏感', d1d:'你有时会多想，有时能放松。', d2:'得分 '+scores.dim2+'/50 · 努力但笨拙', d2d:'你想说清楚，但经常说不出口。', d3:'得分 '+scores.dim3+'/50 · 矛盾中', d3d:'你渴望被爱，又怕说出来显得太需要。', d4:'得分 '+scores.dim4+'/50 · 摸索中', d4d:'你还在寻找适合你们的修复方式。'}
};
var t = texts[personality] || texts['矛盾探索者'];

// ========== 渲染页面 ==========
document.getElementById('tag').textContent = personality;
document.getElementById('title').textContent = '你是：'+personality;
document.getElementById('subtitle').textContent = t.sub;
document.getElementById('dim1Text').innerHTML = '<b>'+t.d1+'</b><br>'+t.d1d;
document.getElementById('dim2Text').innerHTML = '<b>'+t.d2+'</b><br>'+t.d2d;
document.getElementById('dim3Text').innerHTML = '<b>'+t.d3+'</b><br>'+t.d3d;
document.getElementById('dim4Text').innerHTML = '<b>'+t.d4+'</b><br>'+t.d4d;

// 核心发现
var dims = [r1, r2, r3, r4];
var maxDim = Math.max(...dims);
var coreText = '';
if (r4 === maxDim) coreText = '你最大的困局在"冲突后的修复"。你需要完整的对话才能感到安全，但他的修复方式是"翻篇"。';
else if (r2 === maxDim) coreText = '你最大的困局在"表达方式"。你的信号经常加密发送，他收不到。';
else if (r1 === maxDim) coreText = '你最大的困局在"对沉默的解读"。你很容易把他的安静当成不在乎。';
else coreText = '你的四个维度比较均衡，没有特别突出的困局。';
document.getElementById('core').innerHTML = coreText;

// 雷达图
var d1S = Math.round(scores.dim1 * 0.8), d2S = Math.round(scores.dim2 * 0.8), d3S = Math.round(scores.dim3 * 0.8), d4S = Math.round(scores.dim4 * 0.8);
var chart = echarts.init(document.getElementById('radarChart'));
chart.setOption({
    radar: { center: ['50%','50%'], radius: '65%', indicator: [
        { name: '沉默解读', max: 40 }, { name: '需求表达', max: 40 }, 
        { name: '爱意感知', max: 40 }, { name: '冲突修复', max: 40 }
    ], axisName: { color: 'rgba(255,255,255,0.7)', fontSize: 12 },
    splitArea: { areaStyle: { color: ['rgba(224,90,138,0.05)', 'rgba(224,90,138,0.1)'] } },
    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.15)' } } },
    series: [{ type: 'radar', data: [{ value: [d1S, d2S, d3S, d4S], name: '你' }],
    areaStyle: { color: 'rgba(224,90,138,0.3)' }, lineStyle: { color: '#e05a8a', width: 2 },
    itemStyle: { color: '#e05a8a' }, symbol: 'circle', symbolSize: 6 }]
});
window.addEventListener('resize', function(){ chart.resize(); });

// 直击内心题
(function(){
    try {
        var ua = JSON.parse(localStorage.getItem('partner-lab-progress')).answers;
        var qs = [
            {idx:0,t:'🤐 他沉默时，你第一反应是什么', h:'两个人突然安静下来，你脑子里第一个念头是：是不是我又做错什么了。你已经习惯替他的沉默买单。那口锅不是你的。', m:'你有时会把他的沉默当敌意，有时能冷静。你在练习提前反思。', l:'你不会立刻怪自己。你能把沉默当作沉默，不是信号。' },
            {idx:10,t:'📝 你嘴上说没事，心里在等什么', h:'你说“没事”的时候，心里在喊“我有事”。但我们已经知道了——他的接收器解不开加密信号。你发的是密电，他收到的是乱码。', m:'你有时等他自己发现，有时直接说。你正在从加密切换到明码。', l:'你习惯直接说“我需要什么”。这份清晰让你更少被误解。' },
            {idx:19,t:'🗣️ 你发牢骚的背后，藏着哪句话', h:'你为一件事不开心，其实是另一件更重的事压着。那件重事你还没准备好说，先拿小事探路。', m:'你偶尔绕弯，但多数时候能说清。你正在从试探走向直接。', l:'你不太用试探来传达需求。你知道自己在意什么，也敢说出来。' },
            {idx:29,t:'🏠 你小时候，爱是怎么被表达的', h:'小时候在你家，爱可能是一顿饭、一次沉默的肯定。那些表达方式和你现在期待的不一样。你们是在不同频道上长大的两个人。', m:'你能看到童年的影子，也在尝试建立新频道。', l:'你的过去和现在之间没有断层。你已经处理好了童年的影响。' },
            {idx:38,t:'😤 吵完架他秒睡，你在想什么', h:'他秒睡的时候，你一个人在黑暗里重放刚才的话。他的修复是关机，你的修复是对话。', m:'他秒睡的时候你有时难受，有时能消化。你在找平衡。', l:'他秒睡不会让你焦虑。你有自己的恢复方式。' }
        ];
        qs.sort(function(a,b){ return ua[b.idx] - ua[a.idx]; });
        var top = qs[0], sc = ua[top.idx], ans = sc>=4 ? top.h : (sc>=2 ? top.m : top.l);
        var html = '<div class="card highlight"><div class="card-title" style="color:#e05a8a;font-size:18px;">🎯 直击你内心的一道题</div>';
        html += '<div class="card-text" style="font-size:15px;line-height:1.7;"><b>'+top.t+'</b><br><br>'+ans;
        if(sc>=4) html += '<br><br><b style="color:#e05a8a;">为什么会这样？怎么改？答案在完整报告里。</b>';
        html += '</div></div>';
        document.getElementById('deepCard').innerHTML = html;
    } catch(e) { document.getElementById('deepCard').innerHTML = ''; }
})();

// ========== 生成/获取报告编号（防重复）==========
try {
    var storedCode = localStorage.getItem('partner-lab-report-code');
    if (storedCode) {
        currentReportCode = JSON.parse(storedCode).code;
        console.log('使用已有报告编号:', currentReportCode);
    } else {
        currentReportCode = 'PRT-' + Math.random().toString(36).substring(2, 6).toUpperCase();
        localStorage.setItem('partner-lab-report-code', JSON.stringify({code: currentReportCode, timestamp: Date.now()}));
        console.log('生成新报告编号:', currentReportCode);
    }
} catch(e) { console.log(e); }

// ========== 保存数据到 Supabase（防重复）==========
var SUPABASE_URL = 'https://ptadbowmnbytfwoisrup.supabase.co';
var SUPABASE_KEY = 'sb_publishable_VTrW3OmOe2al2vxfs85QGA_Tc_G3wDI';
var reportCodeForSave = currentReportCode;

(function saveToSupabase(){
    var alreadySaved = localStorage.getItem('partner-lab-data-saved');
    if (alreadySaved === 'true') {
        console.log('数据已保存过，跳过重复提交');
        return;
    }
    try {
        var savedProgress = localStorage.getItem('partner-lab-progress');
        var answersArray = savedProgress ? JSON.parse(savedProgress).answers : [];
        fetch(SUPABASE_URL + '/rest/v1/answers', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY,
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
                code: reportCodeForSave,
                personality: personality,
                dim1: scores.dim1,
                dim2: scores.dim2,
                dim3: scores.dim3,
                dim4: scores.dim4,
                answers_json: answersArray
            })
        }).then(function() {
            localStorage.setItem('partner-lab-data-saved', 'true');
            console.log('数据保存成功');
        }).catch(function(e){ console.log('保存失败', e); });
    } catch(e) { console.log(e); }
})();

// ========== 解锁深度报告 ==========
window.addEventListener('DOMContentLoaded', function() {
    var unlockBtn = document.getElementById('unlockDeepReportBtn');
    if (unlockBtn) {
        unlockBtn.onclick = function() {
            var UNLOCK_CODE = '2025';
            var inputCode = prompt('🔒 请输入解锁码（付费后获得）\n\n解锁码获取方式：微信支付 9.9 元后，联系 wotule_nilongme@163.com 获取');
            if (inputCode === UNLOCK_CODE) {
                var reportCode = currentReportCode;
                if (!reportCode) {
                    reportCode = 'PRT-' + Math.random().toString(36).substring(2, 6).toUpperCase();
                    try {
                        localStorage.setItem('partner-lab-report-code', JSON.stringify({code: reportCode, timestamp: Date.now()}));
                    } catch(e) {}
                }
                window.location.href = 'partner-deep-report.html?code=' + reportCode + '&unlock=paid';
            } else if (inputCode !== null && inputCode !== '') {
                alert('❌ 解锁码错误\n\n请确认后重新输入，或联系 wotule_nilongme@163.com 获取正确解锁码');
            }
        };
    }
});

// 保存结果图片
document.getElementById('saveBtn').onclick = function(){
    var btn = this;
    btn.textContent = '生成中...';
    btn.disabled = true;
    html2canvas(document.getElementById('report'), {backgroundColor:'#1a0a28', scale:2, useCORS:true}).then(function(c){
        var a = document.createElement('a');
        a.download = '爱的接收模式.png';
        a.href = c.toDataURL('image/png');
        a.click();
        btn.textContent = '保存结果';
        btn.disabled = false;
    }).catch(function(){
        btn.textContent = '失败，重试';
        btn.disabled = false;
    });
};

// 分享链接
var shareData = encodeURIComponent(personality) + '|' + scores.dim1 + '|' + scores.dim2 + '|' + scores.dim3 + '|' + scores.dim4;
var shareEncoded = btoa(encodeURIComponent(shareData));
var shareUrl = 'https://guanxishiyanshi.github.io/relationship-lab/test.html?partner=' + shareEncoded;

document.getElementById('shareBtn').onclick = function(){
    navigator.clipboard.writeText(shareUrl).then(function(){
        var btn = document.getElementById('shareBtn');
        btn.textContent = '✅ 已复制，去粘贴';
        setTimeout(function(){ btn.textContent = '分享给他 →'; }, 2000);
