<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的爱的接收模式</title>
    <style>
        body { margin:0; padding:16px; background:linear-gradient(135deg,#1a0a28 0%,#2a1a4a 100%); min-height:100vh; font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif; color:#fff; box-sizing:border-box; }
        .container { max-width:420px; margin:0 auto; padding-bottom:40px; }
        .tag { display:inline-block; background:linear-gradient(135deg,#e05a8a,#c04a6a); padding:8px 24px; border-radius:100px; font-size:14px; font-weight:600; margin-bottom:16px; }
        .main-title { font-size:32px; font-weight:700; margin-bottom:8px; }
        .main-subtitle { font-size:16px; color:rgba(255,255,255,0.6); margin-bottom:32px; line-height:1.5; }
        .radar-box { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:20px; padding:16px; margin-bottom:24px; border:1px solid rgba(255,255,255,0.1); }
        #radarChart { width:100%; height:340px; }
        .card { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
        .card .card-title { font-size:16px; font-weight:600; margin-bottom:8px; }
        .card .card-text { font-size:14px; line-height:1.6; color:rgba(255,255,255,0.75); }
        .btn-row { display:flex; gap:12px; margin-top:32px; flex-wrap:wrap; }
        .btn { flex:1; min-width:120px; padding:14px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; text-align:center; }
        .btn-pink { background:linear-gradient(135deg,#e05a8a,#c04a6a); color:#fff; }
        .btn-orange { background:linear-gradient(135deg,#f0974a,#e05a2a); color:#fff; }
        .btn-ghost { background:rgba(255,255,255,0.1); color:#fff; }
        .btn-pay { background:linear-gradient(135deg,#e05a8a,#c04a6a); color:#fff; font-size:18px; padding:18px; width:100%; border-radius:16px; box-shadow:0 8px 24px rgba(224,90,138,0.4); }
        .highlight { border:2px solid rgba(224,90,138,0.5); background:rgba(224,90,138,0.08); }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:#2a1a4a; border-radius:20px; padding:28px 24px; margin:16px; max-width:360px; text-align:center; border:1px solid rgba(255,255,255,0.1); }
        .modal-icon { font-size:40px; margin-bottom:12px; }
        .modal-title { font-size:20px; font-weight:700; margin-bottom:8px; }
        .modal-desc { font-size:14px; color:rgba(255,255,255,0.6); margin-bottom:24px; line-height:1.6; }
        .modal-btns { display:flex; flex-direction:column; gap:10px; }
        .modal-btn { padding:14px; border-radius:12px; border:none; font-size:16px; font-weight:600; cursor:pointer; }
    </style>
</head>
<body>

<!-- 免责声明 -->
<div style="text-align:center; padding:8px; font-size:11px; color:rgba(255,255,255,0.3); margin-bottom:8px;">
    ⚠️ 本测试仅为个人反思工具，不构成心理诊断，不可替代专业心理咨询或医疗服务。
</div>

<div class="container" id="report">

    <div class="tag" id="tag">...</div>
    <div class="main-title" id="title">...</div>
    <div class="main-subtitle" id="subtitle">...</div>

    <div class="radar-box"><div id="radarChart"></div></div>

    <div class="card"><div class="card-title" style="color:#e05a8a;">维度一：对他沉默的解读</div><div class="card-text" id="dim1Text"></div></div>
    <div class="card"><div class="card-title" style="color:#e05a8a;">维度二：表达需求的清晰度</div><div class="card-text" id="dim2Text"></div></div>
    <div class="card"><div class="card-title" style="color:#e05a8a;">维度三：对"被爱"的感知</div><div class="card-text" id="dim3Text"></div></div>
    <div class="card"><div class="card-title" style="color:#e05a8a;">维度四：冲突后的修复</div><div class="card-text" id="dim4Text"></div></div>

    <div class="card highlight"><div class="card-title" style="color:#e05a8a;">🔍 核心发现</div><div class="card-text" id="core"></div></div>

    <div id="deepCard"></div>

    <!-- 付费入口 -->
    <div class="card" style="text-align:center; border:2px solid rgba(224,90,138,0.6); background:rgba(224,90,138,0.08);">
        <div class="card-title" style="color:#e05a8a; font-size:18px;">🔓 为什么会这样？怎么改变？</div>
        <div class="card-text" style="margin-bottom:12px;">解锁 <b>2500字完整深度报告</b>，看清你的爱的接收模式。</div>
        <button class="btn-pay" onclick="window.open('https://你的问卷星链接','_blank')">9.9元 · 解锁完整报告 →</button>
        <p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:8px;">微信支付，自动生成</p>
    </div>
    
    <!-- 创作者故事入口 -->
    <div class="card" style="text-align:center; cursor:pointer;" id="aboutCard">
        <div style="font-size:32px; margin-bottom:8px;">🐰🐲</div>
        <div class="card-title" style="color:#e05a8a;">"我兔了"和"你龙么"是怎么来的？</div>
        <div class="card-text" style="color:rgba(255,255,255,0.5);">看看创作者的故事</div>
    </div>

    <!-- 双人报告模块 -->
    <div id="coupleModule" style="display:none;">
        <div class="card highlight">
            <div class="card-title" style="color:#e05a8a;">🔗 你们的关系诊断</div>
            <div class="card-text" id="coupleInfo"></div>
            <div class="card-text" id="coupleGap" style="margin-top:8px;"></div>
        </div>
        <div style="text-align:center; margin-top:12px;">
            <button class="btn-pay" onclick="window.open('https://你的问卷星双人链接','_blank')">🔓 解锁完整双人翻译指南</button>
        </div>
    </div>

    <!-- 底部按钮 -->
    <div class="btn-row">
        <button class="btn btn-ghost" onclick="window.location.href='https://guanxishiyanshi.github.io/relationship-lab/partner-test.html'">重新测试</button>
        <button class="btn btn-pink" id="saveBtn">保存结果</button>
        <button class="btn btn-orange" id="shareBtn">分享给他 →</button>
        <button class="btn btn-ghost" id="reopenCoupleBtn" style="display:none;">查看双人报告</button>
    </div>
</div>

<!-- 右上角二维码 -->
<div style="position:fixed; top:80px; right:16px; z-index:999; background:#fff; border-radius:12px; padding:10px; box-shadow:0 4px 16px rgba(0,0,0,0.3); text-align:center;">
    <div id="qrcode" style="display:inline-block; width:80px; height:80px;"></div>
    <p style="font-size:10px; color:#666; margin:4px 0 0;">扫码看结果</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
(function(){
var params=new URLSearchParams(window.location.search);
var encoded=params.get('scores');
if(!encoded){try{var s=localStorage.getItem('partner-lab-result');if(s)encoded=btoa(JSON.parse(s).dim1+','+JSON.parse(s).dim2+','+JSON.parse(s).dim3+','+JSON.parse(s).dim4);}catch(e){}}
if(!encoded){document.getElementById('report').innerHTML='<h1>未找到数据</h1><p>请从首页开始测试。</p><button class="btn btn-pink" onclick="window.location.href=\'index.html\'">开始测试</button>';return;}
var s=atob(encoded).split(',').map(Number);
var scores={dim1:s[0],dim2:s[1],dim3:s[2],dim4:s[3]};

function lv(v){if(v>=38)return'高';if(v>=25)return'中';return'低';}
var l1=lv(scores.dim1),l2=lv(scores.dim2),l3=lv(scores.dim3),l4=lv(scores.dim4);
var r1=scores.dim1/50,r2=scores.dim2/50,r3=(50-scores.dim3)/50,r4=scores.dim4/50;
var personality='冷静的船锚';
if(r1>0.7&&r2>0.6&&r4<0.5)personality='疲惫的双面镜';
else if(r2>0.7&&r1>0.6)personality='等待的信号灯';
else if(r1>0.8&&r3<0.4)personality='焦虑的独行者';
else if(r3<0.3&&r2>0.6)personality='感知失调者';
else if(r1>0.7)personality='沉默的接收器';
else if(r4>0.7)personality='等待的信号灯';
else if(r1<0.5&&r2<0.5&&r3<0.5&&r4<0.5)personality='冷静的船锚';

var texts={
    '沉默的接收器':{sub:'我不是不想说，我是不敢要。',d1:'得分 '+scores.dim1+'/50 · 对沉默敏感',d1d:'你常把沉默翻译成"我有问题"。',d2:'得分 '+scores.dim2+'/50 · 需求加密发送',d2d:'你嘴上说"没事"，心里喊"我有事"。',d3:'得分 '+scores.dim3+'/50 · 偏好言语型爱意',d3d:'你最期待的是言语和亲密接触。',d4:'得分 '+scores.dim4+'/50 · 等待式修复',d4d:'你在冲突后习惯等待，等他先开口。'},
    '感知失调者':{sub:'我知道你对我好，但我感受不到爱。',d1:'得分 '+scores.dim1+'/50 · 对沉默较冷静',d1d:'你对他的沉默不太敏感，或已习惯。',d2:'得分 '+scores.dim2+'/50 · 表达偏向抱怨',d2d:'你说出来的常是情绪，不是需求。',d3:'得分 '+scores.dim3+'/50 · 只认言语和陪伴',d3d:'你的爱意接收器只有特定频道。',d4:'得分 '+scores.dim4+'/50 · 需要仪式化修复',d4d:'你需要他说出来、做出来。'},
    '焦虑的独行者':{sub:'我一个人什么都可以，但希望有人让我不用这样。',d1:'得分 '+scores.dim1+'/50 · 不期待了',d1d:'你学会了不期待，因为失望太痛。',d2:'得分 '+scores.dim2+'/50 · 最难说"我需要你"',d2d:'你最不习惯的就是开口求助。',d3:'得分 '+scores.dim3+'/50 · 渴望但不敢承认',d3d:'你其实很想被照顾。',d4:'得分 '+scores.dim4+'/50 · 自己消化',d4d:'你修复的方式是"算了，我想通了再说"。'},
    '等待的信号灯':{sub:'我可以陪你吃苦，但需要看到未来。',d1:'得分 '+scores.dim1+'/50 · 对犹豫敏感',d1d:'你对他的不确定特别警觉。',d2:'得分 '+scores.dim2+'/50 · 试探性表达',d2d:'你不敢一上来就摊牌。',d3:'得分 '+scores.dim3+'/50 · 需要承诺',d3d:'你对亲密感的需求很明确。',d4:'得分 '+scores.dim4+'/50 · 需要完整的修复',d4d:'你需要认真的道歉和明确的承诺。'},
    '疲惫的双面镜':{sub:'我替他说了所有他没说的话，包括我的委屈。',d1:'得分 '+scores.dim1+'/50 · 理解过度',d1d:'你能理解他的沉默，但理解得太多。',d2:'得分 '+scores.dim2+'/50 · 替两个人沟通',d2d:'你把沟通工作全做了。',d3:'得分 '+scores.dim3+'/50 · 能力用太满',d3d:'你能识别多种爱意，但替得太累了。',d4:'得分 '+scores.dim4+'/50 · 总是先破冰',d4d:'你在冲突中替两个人完成修复。'},
    '冷静的船锚':{sub:'我能接住情绪，也等得起修复。',d1:'得分 '+scores.dim1+'/50 · 理解沉默',d1d:'你能分辨沉默的类型。',d2:'得分 '+scores.dim2+'/50 · 直接表达',d2d:'你能温和地说清需求。',d3:'得分 '+scores.dim3+'/50 · 多通道接收',d3d:'你的爱意接收器有弹性。',d4:'得分 '+scores.dim4+'/50 · 节奏灵活',d4d:'你能等也适当时机主动提。'}
};
var t=texts[personality];

document.getElementById('tag').textContent=personality;
document.getElementById('title').textContent='你是：'+personality;
document.getElementById('subtitle').textContent=t.sub;
document.getElementById('dim1Text').innerHTML='<b>'+t.d1+'</b><br>'+t.d1d;
document.getElementById('dim2Text').innerHTML='<b>'+t.d2+'</b><br>'+t.d2d;
document.getElementById('dim3Text').innerHTML='<b>'+t.d3+'</b><br>'+t.d3d;
document.getElementById('dim4Text').innerHTML='<b>'+t.d4+'</b><br>'+t.d4d;

var maxD=Math.max(r1,r2,r4),minD=Math.min(r1,r2,r3,r4);
var core='';
if(r4===maxD)core='你最大的困局在"冲突修复"。你需要完整的对话才能感到安全，但他的修复方式是"翻篇"。';
else if(r2===maxD)core='你最大的困局在"表达方式"。你的信号加密发送，他收不到。';
else if(r1===maxD)core='你最大的困局在"对沉默的解读"。你很容易把他的安静当成不在乎。';
else core='你的四个维度比较均衡。';
if(scores.dim3/50===minD)core+='<br><br>但你的爱意接收器有弹性，这是很宝贵的能力。';
else if(r1===minD)core+='<br><br>但你对他的沉默不太敏感，这让你们少了很多不必要的摩擦。';
else if(r2===minD)core+='<br><br>但你表达需求的直接程度，能降低很多沟通成本。';
else core+='<br><br>你在至少一个方面表现不错，这是可以继续巩固的基础。';
document.getElementById('core').innerHTML=core;

var d1S=Math.round(scores.dim1*(40/50)),d2S=Math.round(scores.dim2*(40/50)),d3S=Math.round(scores.dim3*(40/50)),d4S=Math.round(scores.dim4*(40/50));
var chart=echarts.init(document.getElementById('radarChart'));
chart.setOption({
    radar:{center:['50%','50%'],radius:'65%',indicator:[{name:'沉默解读',max:40},{name:'需求表达',max:40},{name:'爱意感知',max:40},{name:'冲突修复',max:40}],axisName:{color:'rgba(255,255,255,0.7)',fontSize:12},splitArea:{areaStyle:{color:['rgba(224,90,138,0.05)','rgba(224,90,138,0.1)']}},splitLine:{lineStyle:{color:'rgba(255,255,255,0.15)'}},axisLine:{lineStyle:{color:'rgba(255,255,255,0.2)'}}},
    series:[{type:'radar',data:[{value:[d1S,d2S,d3S,d4S],name:'你'}],areaStyle:{color:'rgba(224,90,138,0.3)'},lineStyle:{color:'#e05a8a',width:2},itemStyle:{color:'#e05a8a'},symbol:'circle',symbolSize:6}]
});
window.addEventListener('resize',function(){chart.resize();});

// 直击内心的一道题
(function(){
    try{
        var ua=JSON.parse(localStorage.getItem('partner-lab-progress')).answers;
        var qs=[
            {idx:0,t:'🤐 他沉默时，你第一反应是什么',h:'两个人突然安静下来，你脑子里第一个念头是：是不是我又做错什么了。你已经习惯替他的沉默买单——把安静翻译成自己的错。那口锅不是你的。',m:'你有时会把他的沉默当敌意，有时能冷静。你能反思，但反思总在事后。试着提前一点。',l:'你不会立刻怪自己。你能把沉默当作沉默，不是信号。这份冷静很珍贵。'},
            {idx:10,t:'📝 你嘴上说没事，心里在等什么',h:'你说"没事"的时候，心里在喊"我有事"。你希望他读懂你。但他的接收器解不开加密信号。你发的是密电，他收到的是乱码。',m:'你有时等他自己发现，有时直接说。你正在从加密切换到明码，需要一点信任。',l:'你习惯直接说"我需要什么"。这份清晰让你更少被误解。'},
            {idx:19,t:'🗣️ 你发牢骚的背后，藏着哪句话',h:'你为一件事不开心，其实是另一件更重的事压着。那件重事你还没准备好说，先拿小事探路。下次在牢骚后面加一句："其实我在意的是……"',m:'你偶尔绕弯，但多数时候能说清。你正在从试探走向直接。',l:'你不太用试探来传达需求。你知道自己在意什么，也敢说出来。'},
            {idx:29,t:'🏠 你小时候，爱是怎么被表达的',h:'小时候在你家，爱可能是一顿饭、一次沉默的肯定。那些表达方式和你现在期待的不一样。你们是在不同频道上长大的两个人，用不同的方言说爱。',m:'你能看到童年的影子，也在尝试建立新频道。',l:'你的过去和现在之间没有断层。你已经处理好了童年的影响。'},
            {idx:38,t:'😤 吵完架他秒睡，你在想什么',h:'他秒睡的时候，你一个人在黑暗里重放刚才的话。他的修复是关机，你的修复是对话。下次告诉他：你可以先睡，但在我睡着前，我需要知道你在乎我。',m:'他秒睡的时候你有时难受，有时能消化。你在找平衡。',l:'他秒睡不会让你焦虑。你有自己的恢复方式。'}
        ];
        qs.sort(function(a,b){return ua[b.idx]-ua[a.idx];});
        var top=qs[0],sc=ua[top.idx],ans=sc>=4?top.h:sc>=2?top.m:top.l;
        var html='<div class="card highlight"><div class="card-title" style="color:#e05a8a;font-size:18px;">🎯 直击你内心的一道题</div>';
        html+='<div class="card-text" style="font-size:15px;line-height:1.7;"><b>'+top.t+'</b><br><br>'+ans;
        if(sc>=4)html+='<br><br><b style="color:#e05a8a;">为什么会这样？怎么改？答案在完整报告里。</b>';
        html+='</div></div>';
        document.getElementById('deepCard').innerHTML=html;
    }catch(e){document.getElementById('deepCard').innerHTML='';}
})();

var shareData=encodeURIComponent(personality)+'|'+scores.dim1+'|'+scores.dim2+'|'+scores.dim3+'|'+scores.dim4;
var shareEncoded=btoa(unescape(encodeURIComponent(shareData)));
var shareUrl='https://guanxishiyanshi.github.io/relationship-lab/test.html?partner='+shareEncoded;
var qrUrl='https://guanxishiyanshi.github.io/relationship-lab/partner-result.html?scores='+btoa(scores.dim1+','+scores.dim2+','+scores.dim3+','+scores.dim4)+'&mytype='+encodeURIComponent(personality);
new QRCode(document.getElementById("qrcode"),{text:qrUrl,width:80,height:80,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});

document.getElementById('saveBtn').onclick=function(){
    var btn=this;btn.textContent='生成中...';btn.disabled=true;
    html2canvas(document.getElementById('report'),{backgroundColor:'#1a0a28',scale:2,useCORS:true}).then(function(c){
        var a=document.createElement('a');a.download='爱的接收模式.png';a.href=c.toDataURL('image/png');a.click();
        btn.textContent='保存结果';btn.disabled=false;
    }).catch(function(){btn.textContent='失败，重试';btn.disabled=false;});
};

document.getElementById('shareBtn').onclick=function(){
    navigator.clipboard.writeText(shareUrl).then(function(){
        var btn=document.getElementById('shareBtn');
        btn.textContent='✅ 已复制，去粘贴';
        btn.style.opacity='1';
        setTimeout(function(){btn.style.transition='opacity 0.8s';btn.style.opacity='0.5';setTimeout(function(){btn.textContent='分享给他 →';btn.style.opacity='1';},800);},1500);
    }).catch(function(){prompt('复制这个链接发给他：',shareUrl);});
};

function getPartner(){
    var p=params.get('partner');
    if(!p){try{var s=localStorage.getItem('couple-partner-data');if(s){var d=JSON.parse(s);if(d.personality)return d;}}catch(e){}return null;}
    try{var d=decodeURIComponent(escape(atob(p))).split('|');return{personality:decodeURIComponent(d[0]),dim1:parseInt(d[1]),dim2:parseInt(d[2]),dim3:parseInt(d[3])};}catch(e){return null;}
}
var partner=getPartner();
if(partner){
    function showCouple(){
        localStorage.setItem('couple-partner-data',JSON.stringify(partner));
        document.getElementById('coupleModule').style.display='block';
        document.getElementById('coupleInfo').innerHTML='<b>TA的画像：'+partner.personality+'</b><br>TA的得分：自我情绪 '+partner.dim1+'/40 · 共情回应 '+partner.dim2+'/35 · 爱的动力 '+partner.dim3+'/35';
